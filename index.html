<script>
const USERS = {
  admin:  { hash: "03910b928efe988e1cf30f56f1e24e04ff0c1b8d95cac159565020c8493fbabb", display: "Admin",  role: "admin" },
  nikita: { hash: "5e4ec99b255f996b65e22b605a02289fe3976e5aabc3753f135bcb217bbacf4b", display: "Nikita", role: "artist" },
  igor:   { hash: "63669fcc68f8066547cd0752ed9d8be28638ad3a45e0d2bf24b67218f7a26c23", display: "Igor",   role: "artist" },
  client: { hash: "9a5d23f351880fae8006cc830bbdd30c19acd6ed5464bef860583205fd62d6ec", display: "Client", role: "client" },
};
async function sha256(s){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
let currentUser=null;
async function tryLogin(){const p=document.getElementById("loginPass").value.trim();if(!p)return;const h=await sha256(p);for(const[id,u]of Object.entries(USERS)){if(u.hash===h){currentUser={id,...u};sessionStorage.setItem("kh_user",id);showLoggedIn();return;}}document.getElementById("loginError").textContent="Wrong password";}
function guestLogin(){currentUser={id:"guest",display:"Guest",role:"guest"};sessionStorage.setItem("kh_user","guest");showLoggedIn();}
document.getElementById("loginPass").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});
async function showLoggedIn(){document.getElementById("loginOverlay").classList.add("hidden");document.getElementById("userBadge").style.display="inline-flex";document.getElementById("userName").textContent=currentUser.display;document.getElementById("userDot").className="dot dot-"+currentUser.id;
  // Pull latest data from remote
  const pulled=await _pullRemote();if(pulled){runMigrations();if(state.__users){for(const[id,u]of Object.entries(state.__users)){USERS[id]=u;}}}
  document.querySelector("table").classList.toggle("hide-admin",!isAdmin());
  document.getElementById("adminGear").style.display=isAdmin()?'':'none';
  _loadColFilters();
  _loadEditMode();
  _buildArtistFilterBtns();
  render();
}
function logout(){sessionStorage.removeItem("kh_user");currentUser=null;document.getElementById("loginOverlay").classList.remove("hidden");document.getElementById("userBadge").style.display="none";document.getElementById("loginPass").value="";document.getElementById("loginError").textContent="";render();}
// Auto-login deferred until after SUPA_URL is defined (see below)

function isAdmin(){return currentUser&&currentUser.role==="admin";}
function isArtist(){return currentUser&&currentUser.role==="artist";}
function isClient(){return currentUser&&currentUser.role==="client";}
function isGuest(){return !currentUser||currentUser.role==="guest";}
function canEditStatus(t){if(isGuest()||isClient())return false;if(isAdmin())return true;return getAssignee(t)===currentUser.id;}
function canAssign(){return isAdmin();}
function canEditAdminNote(){return isAdmin();}
function canEditDesc(){return isAdmin()||isClient();}
function canChat(t){if(isGuest())return false;if(isAdmin()||isClient())return true;return isArtist()&&getAssignee(t)===currentUser.id;}

let TASKS=[];
const CAT_LABELS={};
const CAT_COLORS={};
const _RAND_COLORS=["#e06c75","#e5c07b","#98c379","#56b6c2","#61afef","#c678dd","#d19a66","#be5046","#7ec8e3","#f0883e"];
function _loadCustomCats(){const cc=state.__categories||{};Object.keys(cc).forEach(k=>{CAT_LABELS[k]=cc[k].label;CAT_COLORS[k]=cc[k].color;});}
function _saveCustomCat(key,label,color){if(!state.__categories)state.__categories={};state.__categories[key]={label,color};}
function _randCatColor(){return _RAND_COLORS[Math.floor(Math.random()*_RAND_COLORS.length)];}
function getCat(id){return state[id]?.cat||TASKS.find(t=>t.id===id)?.cat||"other";}
function getCatColor(cat){return CAT_COLORS[cat]||"#8b949e";}
function getCatLabel(cat){return CAT_LABELS[cat]||cat;}
function getAllCatKeys(){const keys=new Set(Object.keys(CAT_LABELS));TASKS.forEach(t=>keys.add(t.cat));Object.values(state).forEach(s=>{if(s.cat)keys.add(s.cat);});return[...keys];}
function _catTagHtml(cat,extra){
  const c=getCatColor(cat);
  const bg=c+"22";
  return`<span class="cat-tag${extra||''}" style="background:${bg};color:${c};border:1px solid ${c}44">${esc(getCatLabel(cat))}</span>`;
}
function _catTag(id,cat){
  const c=getCatColor(cat);
  const bg=c+"22";
  return`<span class="cat-tag editable" style="background:${bg};color:${c};border:1px solid ${c}44" onclick="openCatDropdown('${id}',this)">${esc(getCatLabel(cat))}</span>`;
}
let _catEditMode=false;
function openCatDropdown(id,el){
  closeCatDropdown();
  _catEditMode=false;
  const cat=getCat(id);
  const keys=getAllCatKeys();
  const rect=el.getBoundingClientRect();
  const dd=document.createElement("div");
  dd.className="cat-dropdown";dd.id="catDropdown";dd.dataset.tid=id;
  dd.style.top=(rect.bottom+4)+"px";dd.style.left=rect.left+"px";dd.style.position="fixed";
  _renderCatDropdownItems(dd,id,cat,keys,false);
  document.body.appendChild(dd);
  setTimeout(()=>document.addEventListener("mousedown",_closeCatOnClick,{once:true,capture:true}),10);
}
function _renderCatDropdownItems(dd,id,cat,keys,editMode){
  let html=keys.map(k=>{
    const active=k===cat?" active":"";
    const delBtn=editMode?` <span class="cat-del-btn" onclick="event.stopPropagation();deleteCat('${k}')">&times;</span>`:"";
    return`<div class="cat-dropdown-item${active}" onclick="setCat('${id}','${k}')">${_catTagHtml(k)}${delBtn}</div>`;
  }).join("");
  html+=`<div class="cat-dropdown-divider"></div>`;
  html+=`<div style="display:flex;gap:4px;align-items:center"><input class="cat-dropdown-input" placeholder="New category..." onkeydown="if(event.key==='Enter'){addNewCat('${id}',this.value);}">`;
  html+=`<button class="cat-edit-btn" onclick="event.stopPropagation();toggleCatEdit('${id}')" title="Edit categories">&#9998;</button></div>`;
  dd.innerHTML=html;
}
function toggleCatEdit(id){
  if(!isEditMode())return;
  _catEditMode=!_catEditMode;
  const dd=document.getElementById("catDropdown");
  if(!dd)return;
  const cat=getCat(id);
  const keys=getAllCatKeys();
  _renderCatDropdownItems(dd,id,cat,keys,_catEditMode);
  setTimeout(()=>document.addEventListener("mousedown",_closeCatOnClick,{once:true,capture:true}),10);
}
function _closeCatOnClick(e){
  const dd=document.getElementById("catDropdown");
  if(!dd)return;
  if(!dd.contains(e.target)){closeCatDropdown();}
  else{document.addEventListener("mousedown",_closeCatOnClick,{once:true,capture:true});}
}
function closeCatDropdown(){
  document.removeEventListener("mousedown",_closeCatOnClick,{capture:true});
  const dd=document.getElementById("catDropdown");if(dd)dd.remove();_catEditMode=false;
}
function addNewCat(id,name){
  if(!isEditMode())return;
  if(!name||!name.trim())return;
  const key=name.trim().toLowerCase().replace(/[^a-zа-яёіїє0-9]/gi,"_");
  if(!CAT_LABELS[key]){
    const color=_randCatColor();
    CAT_LABELS[key]=name.trim();
    CAT_COLORS[key]=color;
    _saveCustomCat(key,name.trim(),color);
  }
  setCat(id,key);
}
function deleteCat(key){
  if(!isEditMode()||!isAdmin())return;
  delete CAT_LABELS[key];delete CAT_COLORS[key];
  if(state.__categories)delete state.__categories[key];
  // Reset any shots using this cat to "other"
  Object.keys(state).forEach(id=>{if(state[id]?.cat===key)state[id].cat="other";});
  TASKS.forEach(t=>{if(t.cat===key)t.cat="other";});
  saveState(state);
  closeCatDropdown();
  render();
}
function setCat(id,val){
  if(!isEditMode()||!isAdmin())return;
  closeCatDropdown();
  if(!state[id])state[id]={};
  state[id].cat=val;
  saveState(state);
  render();
}
const _DEFAULT_ARTISTS=[{id:"nikita",display:"Nikita"},{id:"igor",display:"Igor"}];
function _getArtists(){return state.__artists||_DEFAULT_ARTISTS;}
const ARTISTS=_DEFAULT_ARTISTS; // initial, patched after state load
const STORAGE_KEY="kh_vfx_tracker";
const SUPA_URL="https://cysomcrwjkszsizgkgaf.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5c29tY3J3amtzenNpemdrZ2FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDI2MTMsImV4cCI6MjA5MDc3ODYxM30.Wmz0fog7GGkqcVX8kGXR54DxsiKekr4ksHha24Odohs";
const SUPA_HEADERS={"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":"return=minimal"};
let _saving=false,_pendingSave=false;
function _tryAuthLink(){
  const params=new URLSearchParams(window.location.search);
  const raw=params.get('auth');
  if(!raw)return false;
  window.history.replaceState({},'',window.location.pathname);
  // Decode: USER_XXXX_USER_XXXX_USER_XXXX...
  const parts=raw.split('_');
  if(parts.length<2)return false;
  const userId=parts[0].toLowerCase();
  const token=parts.filter((_,i)=>i%2===1).join('');
  if(!token||!userId)return false;
  if(!state.__users)return false;
  const u=state.__users[userId];
  if(u&&u.linkToken===token){
    if(!USERS[userId])USERS[userId]=u;
    currentUser={id:userId,...USERS[userId]};
    sessionStorage.setItem("kh_user",userId);
    showLoggedIn();
    return true;
  }
  return false;
}
// Auth link + auto-login deferred to after state init (see _initAuth below)
function _initAuth(){
  (async function(){
    const params=new URLSearchParams(window.location.search);
    if(params.get('auth')){
      await _pullRemote();
      if(state.__users){for(const[id,u] of Object.entries(state.__users)){USERS[id]=u;}}
      if(_tryAuthLink())return;
    }
    const s=sessionStorage.getItem("kh_user");
    if(s==="guest")guestLogin();
    else if(s&&USERS[s]){currentUser={id:s,...USERS[s]};showLoggedIn();}
  })();
}

function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return {};}}

function saveState(s){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(s));
  const n=document.getElementById("saveNotice");
  n.textContent="Saving...";n.classList.add("show");
  if(_saving){_pendingSave=true;return;}
  _saving=true;
  _pushRemote(s).finally(()=>{
    _saving=false;
    if(_pendingSave){_pendingSave=false;saveState(state);}
  });
}

async function _pushRemote(s){
  try{
    const r=await fetch(SUPA_URL+"/rest/v1/tracker_state?id=eq.main",{
      method:"PATCH",
      headers:SUPA_HEADERS,
      body:JSON.stringify({data:s,updated_at:new Date().toISOString()})
    });
    if(!r.ok){const t=await r.text();console.error("Supabase PATCH error:",t);throw new Error(t);}
    const n=document.getElementById("saveNotice");
    n.textContent="Saved";n.style.background="#1f6feb";
    setTimeout(()=>n.classList.remove("show"),1200);
  }catch(e){
    console.error("Push failed:",e);
    const n=document.getElementById("saveNotice");
    n.textContent="Sync error!";n.style.background="#f85149";
    setTimeout(()=>{n.classList.remove("show");n.style.background="";},3000);
  }
}

async function _pullRemote(){
  try{
    const r=await fetch(SUPA_URL+"/rest/v1/tracker_state?id=eq.main&select=data",{
      headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}
    });
    if(!r.ok)return false;
    const rows=await r.json();
    if(rows.length&&rows[0].data&&Object.keys(rows[0].data).length){
      const remote=rows[0].data;
      // Only update if data actually changed
      if(JSON.stringify(remote)===JSON.stringify(state))return false;
      // Merge readState — keep local user's readState
      const localRead=state.__readState&&currentUser?state.__readState[currentUser.id]:null;
      state=remote;
      if(localRead&&currentUser){if(!state.__readState)state.__readState={};state.__readState[currentUser.id]=localRead;}
      localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
      return true;
    }
  }catch(e){console.error("Pull failed:",e);}
  return false;
}

// --- Supabase Realtime via WebSocket ---
function _initRealtime(){
  const wsUrl=SUPA_URL.replace("https://","wss://")+"/realtime/v1/websocket?apikey="+SUPA_KEY+"&vsn=1.0.0";
  let ws,heartbeat;
  function connect(){
    ws=new WebSocket(wsUrl);
    ws.onopen=()=>{
      // Join channel
      ws.send(JSON.stringify({topic:"realtime:public:tracker_state",event:"phx_join",payload:{config:{broadcast:{self:false},postgres_changes:[{event:"UPDATE",schema:"public",table:"tracker_state",filter:"id=eq.main"}]}},ref:"1"}));
      // Heartbeat every 30s
      heartbeat=setInterval(()=>{ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:"hb"}));},30000);
    };
    ws.onmessage=(ev)=>{
      try{
        const msg=JSON.parse(ev.data);
        if(msg.event==="postgres_changes"&&msg.payload?.data?.record?.data){
          const remote=msg.payload.data.record.data;
          if(JSON.stringify(remote)!==JSON.stringify(state)){
            state=remote;
            localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
            // Skip heavy re-renders while upload queue is active — causes scroll interruption
            if(_uploadQueue.processing){return;}
            runMigrations();render();
            if(_gifCurrentId)renderPlayerNotes();
            if(noteTaskId&&noteType==='chat')renderChat();
            if(_shotCurrentId&&_shotTab==='files')_renderShotFiles(_shotCurrentId);
            if(_shotCurrentId&&_shotTab==='versions')_renderShotBody(_shotCurrentId);
          }
        }
      }catch(e){}
    };
    ws.onclose=()=>{clearInterval(heartbeat);setTimeout(connect,3000);};
    ws.onerror=()=>{ws.close();};
  }
  connect();
}

function _getUniqueValues(field){

const _cfPending={id:null,cat:null,artist:null,status:null};

function _buildColFilterDropdown(field){
  const el=document.getElementById("cf-"+field);

  const vals=_getUniqueValues(field);
  const sel=_cfPending[field];
  const showSearch=vals.length>10;
  let html="";
  html+=`<div class="cf-actions"><button onclick="event.stopPropagation();cfSelectAll('${field}')">All</button><button onclick="event.stopPropagation();cfSelectNone('${field}')">None</button></div>`;

  if(showSearch) html+=`<input class="cf-search" placeholder="Search..." oninput="cfSearchFilter('${field}',this.value)" onclick="event.stopPropagation()">`;
  vals.forEach(v=>{
    const checked=!sel||sel.has(v)?"checked":"";
    const label=_labelFor(field,v);
    const escaped=v.replace(/'/g,"\\'");
    html+=`<label class="cf-item" data-val="${v}"><input type="checkbox" ${checked} onclick="event.stopPropagation();cfToggle('${field}','${escaped}',this.checked)"> ${label}</label>`;
  });
  html+=`<div class="cf-divider"></div>`;
  html+=`<div class="cf-actions"><button class="cf-apply-btn" onclick="event.stopPropagation();cfApply('${field}')">Apply</button></div>`;

function toggleColFilter(field,btn){
  const el=document.getElementById("cf-"+field);
  if(!el) return;
  // Close all other dropdowns first (apply pending on close)
  document.querySelectorAll(".col-filter-drop.open").forEach(d=>{if(d!==el){d.classList.remove("open");d.previousElementSibling?.classList.remove("active");}});
  const opening=!el.classList.contains("open");

    // Copy current filter to pending
    _cfPending[field]=colFilters[field]?new Set(colFilters[field]):null;
    _buildColFilterDropdown(field);
    el.classList.add("open");
    btn.classList.add("active");
  } else {
    el.classList.remove("open");
    btn.classList.remove("active");
    _updateColFilterBtnState(field);
  }
}

function cfToggle(field,val,checked){
  const vals=_getUniqueValues(field);
  if(!_cfPending[field]) _cfPending[field]=new Set(vals);
  if(checked) _cfPending[field].add(val); else _cfPending[field].delete(val);
  if(_cfPending[field].size===vals.length) _cfPending[field]=null;
}

async function _initPublicUpload(token){

  if(!state.__admin||!state.__admin.shares){_showPubError('Invalid or expired link');return;}

  for(const[folder,info] of Object.entries(state.__admin.shares)){

function _renderPublicUpload(folder,token){
  _pubFolder=folder;
  let html=`<div class="pub-upload-wrap"><h2>📁 Upload Files</h2><div class="pub-folder">${esc(folder)}</div>`;
  html+=`<div class="files-drop" id="pubDropZone" onclick="document.getElementById('pubFileInput').click()">Drop files here or click to upload</div>`;
  html+=`<input type="file" id="pubFileInput" multiple style="display:none">`;
  html+=`<div class="pub-status" id="pubStatus"></div>`;
  html+=`<div class="pub-upload-list" id="pubList"></div>`;
  html+=`<div class="pub-existing" id="pubExisting"></div>`;
  html+=`</div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  const dz=document.getElementById("pubDropZone");
  const fi=document.getElementById("pubFileInput");
  fi.addEventListener("change",()=>{_pubHandleEntries(folder,Array.from(fi.files).map(f=>({type:'file',file:f,path:f.name})));fi.value='';});
  dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag-over");});
  dz.addEventListener("dragleave",()=>dz.classList.remove("drag-over"));
  dz.addEventListener("drop",async e=>{
    e.preventDefault();dz.classList.remove("drag-over");
    const items=e.dataTransfer.items;
    if(items&&items.length&&items[0].webkitGetAsEntry){
      const entries=[];
      for(let i=0;i<items.length;i++){const en=items[i].webkitGetAsEntry();if(en)entries.push(en);}
      const coll=[];for(const en of entries)coll.push(...await _readEntry(en));
      if(coll.length){_pubHandleEntries(folder,coll);return;}
    }
    // Plain files (no folder structure)
    _pubHandleEntries(folder,Array.from(e.dataTransfer.files).map(f=>({type:'file',file:f,path:f.name})));
  });
  _pubRenderExisting(folder);
}
function _pubRenderExisting(folder){
  const el=document.getElementById("pubExisting");
  if(!el)return;
  // Collect all files from this folder and subfolders
  const allFiles=[];
  const subFolders=[];
  if(state.__admin?.files){
    for(const[key,files] of Object.entries(state.__admin.files)){
      if(key===folder){
        for(const f of files)allFiles.push({...f,rel:f.name});
      } else if(key.startsWith(folder+'/')){
        const sub=key.substring(folder.length+1);
        if(!subFolders.includes(sub))subFolders.push(sub);
        for(const f of files)allFiles.push({...f,rel:sub+'/'+f.name});
      }
    }
  }
  if(allFiles.length===0&&subFolders.length===0){el.innerHTML='';return;}
  let totalSize=0;
  allFiles.forEach(f=>totalSize+=(f.size||0));
  let html=`<h3>Uploaded — ${allFiles.length} file${allFiles.length!==1?'s':''}, ${_formatSize(totalSize)}</h3>`;
  // Show folders first
  for(const sf of subFolders.sort()){
    const folderFiles=allFiles.filter(f=>f.rel.startsWith(sf+'/'));
    let fSize=0;folderFiles.forEach(f=>fSize+=(f.size||0));
    html+=`<div class="pub-existing-item"><span class="pe-icon">📁</span><span class="pe-name">${esc(sf)}/</span><span class="pe-size">${folderFiles.length} files, ${_formatSize(fSize)}</span></div>`;
  }
  // Root-level files
  const rootFiles=allFiles.filter(f=>!f.rel.includes('/'));
  for(const f of rootFiles){
    html+=`<div class="pub-existing-item"><span class="pe-icon">${_fileIcon(f.name)}</span><span class="pe-name">${esc(f.name)}</span><span class="pe-size">${_formatSize(f.size)}</span></div>`;
  }
  el.innerHTML=html;
}
// Duplicate resolution dialog — returns promise: 'replace'|'skip'|'replace_all'|'skip_all'|null
let _pubDupPolicy=null;// 'replace_all' or 'skip_all' — remembered for batch
function _pubAskDuplicate(fileName){
  if(_pubDupPolicy)return Promise.resolve(_pubDupPolicy);
  return new Promise(resolve=>{
    const ov=document.createElement('div');ov.className='pub-dup-overlay';
    ov.innerHTML=`<div class="pub-dup-box"><h3>File already exists</h3><div class="dup-file">${esc(fileName)}</div><p>This file has already been uploaded. What would you like to do?</p><div class="pub-dup-btns"><button onclick="_pubDupResolve(this,'skip')">Skip</button><button onclick="_pubDupResolve(this,'skip_all')">Skip All</button><button onclick="_pubDupResolve(this,'replace')" class="primary">Replace</button><button onclick="_pubDupResolve(this,'replace_all')" class="primary">Replace All</button></div></div>`;
    ov._resolve=resolve;
    document.body.appendChild(ov);
  });
}
function _pubDupResolve(btn,action){
  const ov=btn.closest('.pub-dup-overlay');
  if(action==='replace_all'||action==='skip_all')_pubDupPolicy=action;
  if(ov._resolve)ov._resolve(action);
  ov.remove();
}
let _pubCancelled=new Set();
let _pubCancelAll=false;
async function _pubHandleEntries(folder,entries){
  if(!entries.length)return;
  _pubDupPolicy=null;_pubCancelAll=false;_pubCancelled.clear();
  const statusEl=document.getElementById("pubStatus");
  const listEl=document.getElementById("pubList");
  // Ensure admin state
  if(!state.__admin)state.__admin={};
  if(!state.__admin.files)state.__admin.files={};
  if(!state.__admin.folders)state.__admin.folders=[];
  // Create subfolders from entries
  const fileEntries=entries.filter(c=>c.type==='file');
  const subFolders=new Set();
  for(const c of fileEntries){
    const dir=c.path.substring(0,c.path.lastIndexOf('/'));
    if(dir){
      const parts=dir.split('/');
      for(let i=1;i<=parts.length;i++){subFolders.add(parts.slice(0,i).join('/'));}
    }
  }
  for(const sf of subFolders){
    const fullPath=folder+'/'+sf;
    if(!state.__admin.folders.some(f=>f.name===fullPath)){
      state.__admin.folders.push({name:fullPath});
    }
    if(!state.__admin.files[fullPath])state.__admin.files[fullPath]=[];
  }
  if(subFolders.size)saveState(state);
  // Show cancel all button
  const totalCount=fileEntries.length;
  statusEl.innerHTML=`Uploading 0/${totalCount}... <button class="pub-cancel-all" onclick="_pubCancelAll=true;this.textContent='Cancelling...'">Cancel All</button>`;
  let doneCount=0;
  for(const entry of fileEntries){
    if(_pubCancelAll)break;
    const file=entry.file;
    const relPath=entry.path;// e.g. "folder/sub/file.txt"
    const dir=relPath.substring(0,relPath.lastIndexOf('/'));
    const stateKey=dir?folder+'/'+dir:folder;
    const existingArr=state.__admin.files[stateKey]||(state.__admin.files[stateKey]=[]);
    // Check duplicate
    const dupIdx=existingArr.findIndex(f=>f.name===file.name);
    if(dupIdx>=0){
      const action=await _pubAskDuplicate(file.name);
      if(action==='skip'||action==='skip_all'){
        listEl.insertAdjacentHTML('beforeend',`<div class="pub-upload-item"><span class="pub-icon">⏭</span><span class="pub-name">${esc(relPath)}</span><span class="pub-pct" style="color:#d29922">Skipped</span></div>`);
        doneCount++;continue;
      }
      existingArr.splice(dupIdx,1);
    }
    const r2Key='admin/'+folder+'/'+relPath;
    const itemId='pub-'+Date.now()+'-'+Math.random().toString(36).substr(2,4);
    listEl.insertAdjacentHTML('beforeend',`<div class="pub-upload-item" id="${itemId}"><span class="pub-icon">◌</span><span class="pub-name">${esc(relPath)}</span><span class="pub-pct">0%</span><button class="pub-item-cancel" onclick="_pubCancelled.add('${itemId}')">✕</button></div>`);
    // Upload with infinite retry
    let ok=false,attempt=0;
    while(!ok){
      if(_pubCancelAll||_pubCancelled.has(itemId)){
        const el=document.getElementById(itemId);
        if(el){el.querySelector('.pub-icon').textContent='⛔';el.querySelector('.pub-pct').textContent='Cancelled';const xb=el.querySelector('.pub-item-cancel');if(xb)xb.remove();}
        break;
      }
      ok=await r2UploadXHR(r2Key,file,(pct)=>{
        const el=document.getElementById(itemId);
        if(el)el.querySelector('.pub-pct').textContent=pct+'%';
      });
      if(ok)break;
      if(_pubCancelAll||_pubCancelled.has(itemId))break;
      attempt++;
      const el=document.getElementById(itemId);
      if(el){el.querySelector('.pub-icon').textContent='🔄';el.querySelector('.pub-pct').textContent='Retry #'+attempt+' in 10s...';}
      // Cancellable wait
      for(let w=0;w<100;w++){await new Promise(r=>setTimeout(r,100));if(_pubCancelAll||_pubCancelled.has(itemId))break;}
    }
    if(ok){
      const el=document.getElementById(itemId);
      if(el){el.querySelector('.pub-icon').textContent='✅';el.querySelector('.pub-pct').textContent=_formatSize(file.size);const xb=el.querySelector('.pub-item-cancel');if(xb)xb.remove();}
      existingArr.push({name:file.name,size:file.size,r2key:r2Key,author:'Guest',date:new Date().toISOString().slice(0,10)});
      saveState(state);
      _pubRenderExisting(folder);
    }
    doneCount++;
    if(!_pubCancelAll)statusEl.innerHTML=`Uploading ${doneCount}/${totalCount}... <button class="pub-cancel-all" onclick="_pubCancelAll=true;this.textContent='Cancelling...'">Cancel All</button>`;
  }
  statusEl.textContent=_pubCancelAll?'Cancelled':'Done!';
  _pubRenderExisting(folder);
}

    }

}

function _generateKey(len){
  const chars="ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";
  let r="";for(let i=0;i<len;i++)r+=chars[Math.floor(Math.random()*chars.length)];
  return r;
}
async function addUser(){
  const inp=document.getElementById("newUserName");
  const name=inp?.value.trim();
  const role="artist";
  if(!name)return;
  const id=name.toLowerCase().replace(/[^a-z0-9]/g,"_");
  if(!id)return;
  if(USERS[id]){alert("User with this ID already exists");return;}
  const key=_generateKey(12);
  const hash=await sha256(key);
  const linkToken=_generateKey(24);
  USERS[id]={hash,display:name,role};
  if(!state.__users)state.__users={};
  state.__users[id]={hash,display:name,role,plainKey:key,linkToken};
  if(role==="artist"){
    const artists=_getArtists();
    artists.push({id,display:name});
    state.__artists=artists;
  }
  saveState(state);
  inp.value="";
  document.getElementById("generatedKeyBox").innerHTML=`<div class="generated-key"><code>${key}</code><button onclick="navigator.clipboard.writeText('${key}');this.textContent='Copied!'">Copy</button></div><div style="color:#8b949e;font-size:11px;margin-top:4px">${esc(name)} uses this key to log in.</div>`;
  document.getElementById("userList").innerHTML=_renderUserList();
  render();
}
async function regenKey(id){
  if(!USERS[id])return;
  const key=_generateKey(12);
  const hash=await sha256(key);
  const linkToken=_generateKey(24);
  USERS[id].hash=hash;
  if(!state.__users)state.__users={};
  if(!state.__users[id])state.__users[id]={...USERS[id]};
  state.__users[id].hash=hash;
  state.__users[id].plainKey=key;
  state.__users[id].linkToken=linkToken;
  saveState(state);
  document.getElementById("userList").innerHTML=_renderUserList();
}

  if(!USERS[id])return;
  USERS[id].role=role;
  if(!state.__users)state.__users={};
  if(!state.__users[id])state.__users[id]={...USERS[id]};
  state.__users[id].role=role;
  const artists=_getArtists().filter(a=>a.id!==id);

function copyAuthLink(id){
  const lt=state.__users?.[id]?.linkToken;
  if(!lt)return;
  const base='https://killhouse-vfx.contora.workers.dev/';
  const chunks=lt.match(/.{1,4}/g)||[];
  const ID=id.toUpperCase();
  const encoded=chunks.join('_'+ID+'_');
  const url=base+'?auth='+ID+'_'+encoded+'_'+ID;
  navigator.clipboard.writeText(url);
  // Flash feedback
  const btn=event.target;
  const orig=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=orig,800);
}

function _getSensorOptions(cameraVal){
  if(cameraVal&&SI_SENSOR_MODES[cameraVal])return SI_SENSOR_MODES[cameraVal];
  // Try partial match
  if(cameraVal){
    for(const[cam,modes] of Object.entries(SI_SENSOR_MODES)){
      if(cameraVal.includes(cam)||cam.includes(cameraVal))return modes;
    }
  }
  return SI_OPTIONS.sensor;
}
function _siField(field,placeholder,value){
  return`<div class="si-input-wrap"><input class="si-input" placeholder="${placeholder}" value="${esc(value)}" data-f="${field}" autocomplete="off"></div>`;
}
function _attachSiDropdown(input,options,dynamicFn){
  let dd=null;
  function show(){
    close();
    const opts=dynamicFn?dynamicFn():options;
    const q=input.value.toLowerCase();
    const filtered=opts.filter(o=>o.toLowerCase().includes(q));
    if(!filtered.length)return;
    dd=document.createElement("div");dd.className="si-dd";
    filtered.slice(0,30).forEach(o=>{
      const d=document.createElement("div");d.className="si-dd-item";d.textContent=o;
      d.onmousedown=(e)=>{e.preventDefault();input.value=o;close();};
      dd.appendChild(d);
    });
    input.parentElement.appendChild(dd);
  }
  function close(){if(dd){dd.remove();dd=null;}}
  input.addEventListener("focus",show);
  input.addEventListener("input",show);
  input.addEventListener("blur",()=>setTimeout(close,150));
}
// --- SHOT INFO TOOLTIP ---
let _siTooltipPinned=false,_siTargetX=0,_siTargetY=0,_siCurX=0,_siCurY=0,_siRaf=null;
function _siLerp(){
  const tt=document.getElementById('siTooltip');
  if(!tt||_siTooltipPinned){_siRaf=null;return;}
  _siCurX+=(_siTargetX-_siCurX)*0.03;
  _siCurY+=(_siTargetY-_siCurY)*0.03;
  tt.style.left=Math.round(_siCurX)+'px';
  tt.style.top=Math.round(_siCurY)+'px';
  if(Math.abs(_siTargetX-_siCurX)>0.5||Math.abs(_siTargetY-_siCurY)>0.5){
    _siRaf=requestAnimationFrame(_siLerp);
  } else { _siRaf=null; }
}
function _siTooltipHtml(id){
  const si=getShotInfo(id);
  const sections=[
    {title:"Camera & Optics",fields:[["Camera",si.camera],["Sensor Mode",si.sensor],["Lens",si.lens],["Focal Length",si.focalLength],["T-Stop",si.tStop],["Focus Distance",si.focusDistance],["Filters",si.filters]]},
    {title:"Format",fields:[["Resolution",si.resolution],["Aspect Ratio",si.aspectRatio],["FPS",si.fps],["Shutter",si.shutterAngle]]},
    {title:"Color Pipeline",fields:[["Color Space",si.colorSpace],["Gamma",si.gamma],["Bit Depth",si.bitDepth],["Codec",si.codec],["LUT / IDT",si.lut]]},
  ];
  let rows='';
  sections.forEach(s=>{
    const filled=s.fields.filter(f=>f[1]);
    if(!filled.length)return;
    rows+=`<div style="font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-top:10px;padding:6px 0 4px;border-bottom:1px solid #30363d;font-weight:600">${s.title}</div>`;
    rows+=filled.map(f=>`<div class="si-tt-row"><span class="si-tt-label">${f[0]}</span><span class="si-tt-val">${esc(f[1])}</span></div>`).join('');
  });
  if(!rows)rows='<div style="color:#484f58;font-size:12px">No data</div>';
  return`<div class="si-tt-title">${id}</div>${rows}`;
}
function _calcTooltipPos(tt,mx,my){
  const r=tt.getBoundingClientRect();
  const h=r.height||200;
  const w=r.width||340;
  let left=mx+250;
  let top=my-h/2;
  if(left+w>window.innerWidth-40)left=mx-w-80;
  if(left<40)left=40;
  if(top+h>window.innerHeight-40)top=window.innerHeight-h-40;
  if(top<40)top=40;
  return{left,top};
}
function showSiTooltip(id,e){
  if(_siTooltipPinned)return;
  let tt=document.getElementById('siTooltip');
  if(!tt){tt=document.createElement('div');tt.className='si-tooltip';tt.id='siTooltip';document.body.appendChild(tt);}
  tt.innerHTML=_siTooltipHtml(id);
  tt.style.opacity='1';
  const pos=_calcTooltipPos(tt,e.clientX,e.clientY);
  _siTargetX=pos.left;_siTargetY=pos.top;
  _siCurX=pos.left;_siCurY=pos.top;
  tt.style.left=pos.left+'px';tt.style.top=pos.top+'px';
}
function moveSiTooltip(e){
  if(_siTooltipPinned)return;
  const tt=document.getElementById('siTooltip');
  if(!tt)return;
  const pos=_calcTooltipPos(tt,e.clientX,e.clientY);
  _siTargetX=pos.left;_siTargetY=pos.top;
  if(!_siRaf)_siRaf=requestAnimationFrame(_siLerp);
}
function hideSiTooltip(){
  if(_siTooltipPinned)return;
  const tt=document.getElementById('siTooltip');
  if(tt){tt.style.opacity='0';setTimeout(()=>{if(!_siTooltipPinned&&tt.style.opacity==='0')tt.remove();},200);}
}
function pinSiTooltip(id){
  const tt=document.getElementById('siTooltip');
  if(_siTooltipPinned){_siTooltipPinned=false;if(tt)tt.remove();return;}
  if(!tt){showSiTooltip(id,{clientX:0,clientY:0});}
  const t=document.getElementById('siTooltip');
  if(!t)return;
  _siTooltipPinned=true;
  t.classList.add('pinned');
  t.innerHTML=_siTooltipHtml(id)+`<div style="text-align:right;margin-top:8px"><button onclick="_siTooltipPinned=false;document.getElementById('siTooltip')?.remove()" style="background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px">Close</button>${isAdmin()&&isEditMode()?` <button onclick="_siTooltipPinned=false;document.getElementById('siTooltip')?.remove();openShotInfoModal('${id}')" style="background:#1f6feb;border:1px solid #1f6feb;color:#fff;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px">Edit</button>`:''}</div>`;
  function onClickOutside(e){if(!t.contains(e.target)){_siTooltipPinned=false;t.remove();document.removeEventListener('click',onClickOutside);}}
  setTimeout(()=>document.addEventListener('click',onClickOutside),0);
}

function _renderFileLinks(html){
  // Replace [[filecard:path]] with rich file card
  html=html.replace(/\[\[filecard:([^\]]+)\]\]/g,(m,path)=>_renderFileCard(path));
  // Replace [[file:path/to/file.txt]] with clickable link
  html=html.replace(/\[\[file:([^\]]+)\]\]/g,(m,path)=>{
    const name=path.includes('/')?path.split('/').pop():path;
    const icon=path.endsWith('/')||!name.includes('.')?'📁':'📄';
    return `<span class="chat-file-link" onclick="_navigateChatFile('${esc(path)}')" title="${esc(path)}">${icon} ${esc(name)}</span>`;
  });
  return html;
}
function _navigateChatFile(path){
  if(!noteTaskId||noteType!=='chat')return;
  const parts=path.split('/');
  const fileName=parts.pop();
  // Navigate to folder
  _filesPath=[];
  for(const p of parts)_filesPath.push(p);
  _renderShotFiles(noteTaskId);
  // Highlight file after render
  setTimeout(()=>{
    const body=document.getElementById("chatFilesBody");
    if(!body)return;
    _clearSelection();
    _fileSelection.add(fileName);
    _updateSelectionUI(noteTaskId);
    // Scroll to selected row
    const row=body.querySelector(`tr[data-sel-name="${CSS.escape(fileName)}"]`);
    if(row)row.scrollIntoView({behavior:'smooth',block:'center'});
  },50);
}
function renderMsgContent(text, mid) {
  // Handle file cards/links BEFORE escaping (they contain raw paths)
  if(text.includes('[[filecard:'))return `<div>${text.replace(/\[\[filecard:([^\]]+)\]\]/g,(m,p)=>_renderFileCard(p))}</div>`;
  // Check if message contains todo items: lines starting with - [ ] or - [x]
  const lines = text.split('\n');
  const hasTodo = lines.some(l => /^\s*-\s*\[([ xX])\]/.test(l));
  if (!hasTodo){
    // Extract [[file:...]] before escaping, replace with placeholders
    const fileLinks=[];
    let safe=text.replace(/\[\[file:([^\]]+)\]\]/g,(m,p)=>{fileLinks.push(p);return `__FLINK${fileLinks.length-1}__`;});
    let html=`<div>${esc(safe)}</div>`;
    fileLinks.forEach((p,i)=>{
      const name=p.includes('/')?p.split('/').pop():p;
      const icon=p.endsWith('/')||!name.includes('.')?'📁':'📄';
      html=html.replace(`__FLINK${i}__`,`<span class="chat-file-link" onclick="_navigateChatFile('${esc(p)}')" title="${esc(p)}">${icon} ${esc(name)}</span>`);
    });
    return html;
  }

  let html = '<ul class="chat-todo">';
  let lineIdx = 0;
  for (const line of lines) {
    const todoMatch = line.match(/^\s*-\s*\[([ xX])\]\s*(.*)/);
    if (todoMatch) {
      const checked = todoMatch[1].toLowerCase() === 'x';
      const label = todoMatch[2];
      const canToggle = canChat(noteTaskId);
      html += `<li>`;
      html += `<button class="chat-todo-check${checked?' checked':''}" ${canToggle?`onclick="toggleTodo(${mid},${lineIdx})"`:''} title="${checked?'Uncheck':'Check'}">${checked?'&#10003;':''}</button>`;
      html += `<span class="chat-todo-text${checked?' done':''}">${esc(label)}</span>`;
      html += `</li>`;
    } else if (line.trim()) {
      html += `<li><span class="chat-todo-text">${esc(line)}</span></li>`;
    }
    lineIdx++;
  }
  html += '</ul>';
  return _renderFileLinks(html);
}

function toggleTodo(mid, lineIdx) {
  const msgs = getChat(noteTaskId);
  const m = msgs.find(x => x.id === mid);
  if (!m || m.deleted) return;
  const lines = m.text.split('\n');
  if (lineIdx >= lines.length) return;
  const line = lines[lineIdx];
  const match = line.match(/^(\s*-\s*\[)([ xX])(\]\s*.*)/);
  if (!match) return;
  const newCheck = match[2].toLowerCase() === 'x' ? ' ' : 'x';
  lines[lineIdx] = match[1] + newCheck + match[3];
  m.text = lines.join('\n');
  saveState(state);
  renderChat();
  render();
}

function _collectPlayerNotes(id){
  const notes=[];
  // Source notes
  const src=state[id]?.playerNotes||[];
  src.forEach(n=>{notes.push({...n,_isPlayerNote:true,_version:'Source',_versionIdx:-1});});
  // Version notes
  const versions=state[id]?.versions||[];
  versions.forEach((v,i)=>{
    (v.notes||[]).forEach(n=>{notes.push({...n,_isPlayerNote:true,_version:v.name||'Version '+(i+1),_versionIdx:i});});
  });
  return notes;
}

function _chatPanelDrop(e){
  if(noteType!=='chat')return;
  e.preventDefault();e.stopPropagation();
  const ta=document.getElementById("chatTA");if(ta)ta.classList.remove("chat-drop-active");
  const cm=document.getElementById("chatMessages");if(cm)cm.classList.remove("drop-highlight");
  const file=e.dataTransfer.getData("text/x-file-move");
  const folder=e.dataTransfer.getData("text/x-folder-move");
  const multi=e.dataTransfer.getData("text/x-multi-move");
  let names=[];
  if(multi){try{names=JSON.parse(multi);}catch(ex){}}
  else if(file)names=[file];
  else if(folder)names=[folder];
  if(!names.length)return;
  const path=_filesPath.length?_filesPath.join('/')+'/':'';
  // Drop on textarea = inline link, drop on messages = file card
  const onTA=ta&&(ta.contains(e.target)||e.target===ta);
  if(onTA){
    const insert=names.map(n=>`[[file:${path}${n}]]`).join(' ');
    const pos=ta.selectionStart||0;
    ta.value=ta.value.slice(0,pos)+insert+ta.value.slice(pos);

function _renderFileCard(path){
  // Find file/folder info from shot data
  const id=noteTaskId;
  if(!id)return `<span class="chat-file-link" onclick="_navigateChatFile('${esc(path)}')">${esc(path)}</span>`;
  const parts=path.replace(/\/$/,'').split('/');
  const name=parts[parts.length-1];
  const isFolder=path.endsWith('/');
  // Try to find in file tree
  let items=_getFilesRoot(id);
  for(let i=0;i<parts.length-1;i++){
    const f=items.find(x=>x.name===parts[i]&&x.type==='folder');
    if(f)items=f.children||[];else break;
  }
  const entry=items.find(x=>x.name===name);
  let size='',count='';
  const icon=isFolder||entry?.type==='folder'?'📁':_fileIcon(name);
  if(entry?.type==='folder'){
    const _cnt=(arr)=>{let n=0;for(const c of arr){if(c.type==='folder')n+=_cnt(c.children||[]);else n++;}return n;};
    const _sz=(arr)=>{let n=0;for(const c of arr){if(c.type==='folder')n+=_sz(c.children||[]);else n+=(c._bytes||0);}return n;};
    const fc=_cnt(entry.children||[]);const fb=_sz(entry.children||[]);
    if(fc)count=fc+' file'+(fc!==1?'s':'');
    if(fb)size=_formatSize(fb);
  } else if(entry){
    size=entry.size||'';
  }
  const meta=[count,size].filter(Boolean).join(' • ');
  let dlBtn='';
  if(entry?.type==='folder'){
    dlBtn=`<button class="cfc-btn" onclick="event.stopPropagation();_downloadCardFolder('${esc(path)}')" title="Download as ZIP">⬇</button>`;
  } else if(entry?.url){
    dlBtn=`<button class="cfc-btn" onclick="event.stopPropagation();_downloadFile('${esc(entry.url)}','${esc(name)}')" title="Download">⬇</button>`;
  }
  return `<div class="chat-file-card" onclick="_navigateChatFile('${esc(path)}')"><span class="cfc-icon">${icon}</span><div class="cfc-info"><div class="cfc-name">${esc(name)}</div>${meta?`<div class="cfc-meta">${meta}</div>`:''}</div><div class="cfc-actions"><button class="cfc-btn" onclick="event.stopPropagation()" title="Share (coming soon)">🔗</button>${dlBtn}</div></div>`;
}
function _downloadFile(url,name){
  const a=document.createElement('a');

  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function _downloadCardFolder(path){
  const id=noteTaskId;if(!id)return;
  const parts=path.replace(/\/$/,'').split('/');
  let items=_getFilesRoot(id);
  for(let i=0;i<parts.length-1;i++){const f=items.find(x=>x.name===parts[i]&&x.type==='folder');if(f)items=f.children||[];else return;}
  const folder=items.find(x=>x.name===parts[parts.length-1]&&x.type==='folder');
  if(!folder||!folder.children)return;
  _downloadAsZip(_collectFileUrlsWithPath(folder.children,''),id+'_'+parts[parts.length-1]);
}

async function sendChat(){
  const ta=document.getElementById("chatTA");if(!ta)return;
  let text=ta.value.trim();
  let imgUrl=null;
  // Upload pending image
  if(_chatPendingFile){
    imgUrl=await _uploadChatImage(_chatPendingFile);
    _chatPendingFile=null;
    const preview=document.getElementById('chatPastePreview');
    if(preview)preview.classList.add('hidden');
  }
  if(!text&&!imgUrl)return;
  // Convert visual ○/● back to - [ ]/- [x], and auto-prefix plain lines in todo mode
  if(todoMode){
    text=text.split('\n').map(l=>{
      let trimmed=l.trim();
      if(!trimmed)return '';
      // Convert visual circles to markdown
      if(trimmed.startsWith('○ '))return '- [ ] '+trimmed.substring(2);
      if(trimmed.startsWith('● '))return '- [x] '+trimmed.substring(2);
      if(/^\s*-\s*\[([ xX])\]/.test(trimmed))return trimmed;
      return '- [ ] '+trimmed;
    }).filter(Boolean).join('\n');
    if(!text)return;
  }
  if(!state[noteTaskId])state[noteTaskId]={};
  if(!state[noteTaskId].artistNotes)state[noteTaskId].artistNotes=[];
  if(editingMsgId!==null){
    // Edit existing message
    const m=state[noteTaskId].artistNotes.find(x=>x.id===editingMsgId);
    if(m){m.text=text;m.edited=true;}
    editingMsgId=null;
  } else {
    const author=isAdmin()?"admin":isClient()?"client":"artist";
    const msg={id:nextMsgId(noteTaskId),author,text,replyTo:replyToId,ts:Date.now()};
    if(imgUrl)msg.img=imgUrl;
    state[noteTaskId].artistNotes.push(msg);
  }
  replyToId=null;
  if(todoMode)todoMode=false;
  saveState(state);
  renderChat();
  render();
}

function chatToggleSelect(mid,el){

function _canDeleteSelected(mid){
  if(typeof mid==="string"&&mid.startsWith("pn_")) return isAdmin();
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  if(!m) return false;
  if(m.deleted) return isAdmin();
  const isOwn=(isAdmin()&&m.author==="admin")||(isArtist()&&m.author==="artist")||(isClient()&&m.author==="client");
  return isAdmin()||isOwn;
}

function chatDeleteSelected(){
  if(!_chatSelected.size)return;
  const msgs=getChat(noteTaskId);
  let deleted=0;
  _chatSelected.forEach(mid=>{
    if(!_canDeleteSelected(mid)) return;
    if(typeof mid==="string"&&mid.startsWith("pn_")){
      const parts=mid.split("_");const pnId=parseInt(parts[1]);const vIdx=parseInt(parts[2]);
      let arr=null;
      if(vIdx===-1){ arr=state[noteTaskId]?.playerNotes; }
      else { const v=state[noteTaskId]?.versions?.[vIdx]; arr=v?.notes; }
      if(arr){
        const idx=arr.findIndex(n=>n.id===pnId);
        if(idx>=0){
          const note=arr[idx];
          // Delete associated drawing
          if(note.drawing&&note.frame!=null){
            const dStore=vIdx===-1?state[noteTaskId]?.drawings:state[noteTaskId]?.versions?.[vIdx]?.drawings;
            if(dStore&&dStore[note.frame]){
              const da=dStore[note.frame];
              for(let i=da.length-1;i>=0;i--){if(da[i].t===note.drawing.tool&&da[i].c===note.drawing.color){da.splice(i,1);break;}}
              if(!da.length)delete dStore[note.frame];
            }
          }
          arr.splice(idx,1);deleted++;
        }
      }
      return;
    }
    const m=msgs.find(x=>x.id===mid);
    if(!m)return;
    if(m.deleted&&isAdmin()){
      const idx=msgs.indexOf(m);if(idx>=0){msgs.splice(idx,1);deleted++;}
    } else {
      const isOwn=(isArtist()&&m.author==="artist")||(isClient()&&m.author==="client");
      if(isAdmin()||isOwn){m.deletedText=m.text;m.deleted=true;m.text="";deleted++;}
    }
  });
  if(!deleted)return;
  saveState(state);
  _chatSelectMode=false;_chatSelected.clear();
  renderChat();render();
}

function deleteMsg(mid){
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  if(!m)return;
  // If already soft-deleted and admin clicks again — permanent delete
  if(m.deleted&&isAdmin()){
    const idx=msgs.indexOf(m);
    if(idx>=0)msgs.splice(idx,1);
    saveState(state);
    renderChat();
    render();
    return;
  }
  const isOwn=(isArtist()&&m.author==="artist")||(isClient()&&m.author==="client");
  if(isAdmin()||isOwn){
    m.deletedText=m.text;
    m.deleted=true;m.text="";

function _getVideoRect(){
  // Compute the actual rendered video area inside the object-fit:contain container
  const vid=_vid();
  if(!vid||!vid.videoWidth||!vid.videoHeight)return null;
  const cw=vid.offsetWidth, ch=vid.offsetHeight;
  const vw=vid.videoWidth, vh=vid.videoHeight;
  const scale=Math.min(cw/vw, ch/vh);
  const rw=vw*scale, rh=vh*scale;
  const ox=(cw-rw)/2, oy=(ch-rh)/2;
  return {left:ox, top:oy, width:rw, height:rh};
}
function _initDrawCanvas(){

function _drawShape(s){
  const ctx=_drawCtx;

  ctx.beginPath();
  if(s.tool==="triangle"){
    const cx=(x1+x2)/2;
    ctx.moveTo(cx,Math.min(y1,y2));
    ctx.lineTo(Math.min(x1,x2),Math.max(y1,y2));
    ctx.lineTo(Math.max(x1,x2),Math.max(y1,y2));
    ctx.closePath();
  } else if(s.tool==="rect"){
    ctx.rect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1));

    const rx=Math.abs(x2-x1)/2,ry=Math.abs(y2-y1)/2;
    const cx=Math.min(x1,x2)+rx,cy=Math.min(y1,y2)+ry;
    ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);

function deletePlayerNote(nid){

          arr.splice(i,1);break;

function _compileNotesToDesc(){
  if(!_gifCurrentId)return;
  if(!state[_gifCurrentId])state[_gifCurrentId]={};
  const notes=_getPlayerNotes();
  // Keep original description from the task table
  const task=TASKS.find(t=>t.id===_gifCurrentId);
  const original=task?task.desc:'';
  const existing=state[_gifCurrentId].desc||original||'';
  const marker='--- Notes ---';
  const base=existing.split(marker)[0].trim();
  if(!notes.length){
    // All notes deleted — remove notes section, keep original
    state[_gifCurrentId].desc=base;
    saveState(state);
    return;
  }
  // Build new notes text
  const lines=notes.map(n=>{
    let prefix=n.tc?'['+n.tc+'] ':'';
    if(n.drawing)prefix+=(TOOL_ICONS[n.drawing.tool]||'')+' ';
    return prefix+(n.text||'(no description)');
  }).join('\n');
  state[_gifCurrentId].desc=base?(base+'\n'+marker+'\n'+lines):(marker+'\n'+lines);
  saveState(state);
}

  }

const _sizeCache={};
async function _r2HeadSize(r2Key){
  const now=new Date();
  const amzDate=now.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const dateStamp=amzDate.substring(0,8);
  const region="auto",service="s3";
  const host=new URL(R2_ENDPOINT).host;
  const encodedPath="/"+R2_BUCKET+"/"+r2Key.split("/").map(s=>encodeURIComponent(s)).join("/");
  const headers={"host":host,"x-amz-content-sha256":"UNSIGNED-PAYLOAD","x-amz-date":amzDate};
  const signedHeaders=Object.keys(headers).sort().join(";");
  const canonicalHeaders=Object.keys(headers).sort().map(k=>k+":"+headers[k]).join("\n")+"\n";
  const canonicalRequest=["HEAD",encodedPath,"",canonicalHeaders,signedHeaders,"UNSIGNED-PAYLOAD"].join("\n");
  const scope=dateStamp+"/"+region+"/"+service+"/aws4_request";
  const stringToSign=["AWS4-HMAC-SHA256",amzDate,scope,await _sha256hex(canonicalRequest)].join("\n");
  const signingKey=await _getSigningKey(R2_SECRET_KEY,dateStamp,region,service);
  const sig=[...await _hmac(signingKey,stringToSign)].map(b=>b.toString(16).padStart(2,"0")).join("");
  const auth="AWS4-HMAC-SHA256 Credential="+R2_ACCESS_KEY+"/"+scope+", SignedHeaders="+signedHeaders+", Signature="+sig;
  const r=await fetch(R2_ENDPOINT+encodedPath,{method:"HEAD",headers:{...headers,"Authorization":auth}});
  return parseInt(r.headers.get("content-length"))||0;
}
function _fetchSize(url,cb){
  if(_sizeCache[url]!==undefined){cb(_sizeCache[url]);return;}
  _sizeCache[url]=-1;// mark as fetching
  const r2Key=url.replace(CDN_BASE+'/','');
  _r2HeadSize(r2Key).then(cl=>{_sizeCache[url]=cl;cb(cl);}).catch(()=>{_sizeCache[url]=0;});
}
function _getFilesRoot(id){
  // Admin files: no locked source/versions folders, just user folders + files
  if(id==='__admin'){
    _ensureAdminState();
    const filesDict=state.__admin.files;
    const folderData=state.__admin.folders;
    const shares=state.__admin.shares||{};
    function _buildAdminTree(prefix){
      const result=[];const seen=new Set();
      for(const uf of folderData){
        let relName;
        if(prefix===''){if(uf.name.includes('/'))continue;relName=uf.name;}
        else{if(!uf.name.startsWith(prefix+'/'))continue;relName=uf.name.substring(prefix.length+1);if(relName.includes('/'))continue;}
        if(seen.has(relName))continue;seen.add(relName);
        const fullPath=prefix?prefix+'/'+relName:relName;
        const files=(filesDict[fullPath]||[]).map(f=>({name:f.name,size:_formatSize(f.size),_bytes:f.size||0,date:f.date||'—',url:CDN_BASE+'/'+f.r2key,author:f.author||''}));
        const subFolders=_buildAdminTree(fullPath);
        const hasShare=!!shares[fullPath];
        result.push({name:relName,type:'folder',locked:false,children:files.concat(subFolders),fullPath,hasShare});
      }
      return result;
    }
    const userFolders=_buildAdminTree('');
    const rootFiles=(filesDict['_root']||[]).map(f=>({name:f.name,size:_formatSize(f.size),_bytes:f.size||0,date:f.date||'—',url:CDN_BASE+'/'+f.r2key,author:f.author||''}));
    return userFolders.concat(rootFiles);
  }
  const hasSrc=hasGif(id);
  // source: original + preview — read from state files, fallback to video/ convention
  const statePreviewFiles=(state[id]?.files?.['source/preview'])||[];
  let sourcePreview;
  if(statePreviewFiles.length){
    sourcePreview=statePreviewFiles.map(f=>({name:f.name,size:f.size?_formatSize(f.size):'…',_bytes:f.size||0,date:f.date||'—',url:CDN_BASE+'/'+f.r2key,author:f.author||''}));
  } else if(hasSrc){
    const srcUrl=CDN_BASE+"/video/"+id+"_prev.mp4";
    const srcBytes=_sizeCache[srcUrl]>0?_sizeCache[srcUrl]:0;
    sourcePreview=[{name:id+"_prev.mp4",size:srcBytes?_formatSize(srcBytes):'…',_bytes:srcBytes,date:"—",url:srcUrl}];
    if(!_sizeCache[srcUrl])_fetchSize(srcUrl,()=>{if(_shotCurrentId===id&&_shotTab==='files')_renderShotFiles(id);});
  } else { sourcePreview=[]; }
  const stateOrigFiles=(state[id]?.files?.['source/original'])||[];
  const sourceOriginal=stateOrigFiles.map(f=>({name:f.name,size:f.size?_formatSize(f.size):'…',_bytes:f.size||0,date:f.date||'—',url:CDN_BASE+'/'+f.r2key,author:f.author||''}));
  const sourceChildren=[
    {name:"original",type:"folder",locked:true,children:sourceOriginal},
    {name:"preview",type:"folder",locked:true,children:sourcePreview},
  ];
  // versions: preview (artist uploads _v###) + final (approved renders)
  const versions=state[id]?.versions||[];
  const versionPreviews=versions.map(v=>{
    let bytes=v.size||0;
    if(!bytes&&v.url){bytes=_sizeCache[v.url]>0?_sizeCache[v.url]:0;if(!_sizeCache[v.url])_fetchSize(v.url,()=>{if(_shotCurrentId===id&&_shotTab==='files')_renderShotFiles(id);});}
    return {name:v.name||'unknown',size:bytes?_formatSize(bytes):'…',_bytes:bytes,date:v.ts?new Date(v.ts).toISOString().slice(0,10):"—",url:v.url};
  });
  const finalFiles=(state[id]?.files?.['versions/final']||[]).map(f=>({
    name:f.name,size:_formatSize(f.size),_bytes:f.size||0,date:f.date||'—',url:CDN_BASE+'/'+f.r2key
  }));
  const origFiles=(state[id]?.files?.['source/original']||[]).map(f=>({
    name:f.name,size:_formatSize(f.size),_bytes:f.size||0,date:f.date||'—',url:CDN_BASE+'/'+f.r2key
  }));
  if(origFiles.length) sourceChildren[0].children=origFiles;
  const versionsChildren=[
    {name:"preview",type:"folder",locked:false,children:versionPreviews},
    {name:"final",type:"folder",locked:false,children:finalFiles},
  ];
  const root=[
    {name:"source",type:"folder",locked:true,children:sourceChildren},
    {name:"versions",type:"folder",locked:true,children:versionsChildren},
  ];
  // user-created folders from state (build nested tree from flat paths)
  const userFolderData=state[id]?.userFolders||[];
  function _buildUserTree(prefix){
    const result=[];
    const seen=new Set();
    for(const uf of userFolderData){
      let relName;
      if(prefix===''){
        if(uf.name.includes('/'))continue;
        relName=uf.name;
      } else {
        if(!uf.name.startsWith(prefix+'/'))continue;
        relName=uf.name.substring(prefix.length+1);
        if(relName.includes('/'))continue;
      }
      if(seen.has(relName))continue;
      seen.add(relName);
      const fullPath=prefix?prefix+'/'+relName:relName;
      const files=(state[id]?.files?.[fullPath]||[]).map(f=>({
        name:f.name,size:_formatSize(f.size),_bytes:f.size||0,date:f.date||'—',url:CDN_BASE+'/'+f.r2key
      }));
      const subFolders=_buildUserTree(fullPath);
      result.push({name:relName,type:"folder",locked:false,children:files.concat(subFolders)});
    }
    return result;
  }
  const userFolders=_buildUserTree('');
  // root-level files
  const rootFiles=(state[id]?.files?.['_root']||[]).map(f=>({
    name:f.name,size:_formatSize(f.size),_bytes:f.size||0,date:f.date||'—',url:CDN_BASE+'/'+f.r2key
  }));
  return root.concat(userFolders).concat(rootFiles);
}
function _formatSize(bytes){
  if(!bytes||bytes==='—')return '—';
  if(bytes<1024)return bytes+' B';
  if(bytes<1048576)return (bytes/1024).toFixed(1)+' KB';
  if(bytes<1073741824)return (bytes/1048576).toFixed(1)+' MB';
  return (bytes/1073741824).toFixed(2)+' GB';
}
function _resolveFilesPath(id){
  let items=_getFilesRoot(id);
  let breadcrumb=id==='__admin'?'admin':id;
  let currentFolder=null;
  for(const p of _filesPath){
    const folder=items.find(f=>f.name===p&&f.type==='folder');
    if(folder){currentFolder=folder;items=folder.children||[];breadcrumb+=" / "+p;}
    else break;
  }
  return {items,breadcrumb,currentFolder};
}

function _getSelectableItems(id){
  const {items}=_resolveFilesPath(id);
  return items.filter(f=>!f.locked).map(f=>f.name);
}
function _rangeSelect(id,name){
  const all=_getSelectableItems(id);
  const from=all.indexOf(_lastClickedItem);
  const to=all.indexOf(name);
  if(from<0||to<0)return;
  const [lo,hi]=from<to?[from,to]:[to,from];
  for(let i=lo;i<=hi;i++)_fileSelection.add(all[i]);
  _lastClickedItem=name;
}
function _updateSelectionUI(id){
  const body=_chatFileMode?document.getElementById("chatFilesBody"):document.getElementById("shotBody");
  if(!body)return;
  body.querySelectorAll("tr[data-sel-name]").forEach(row=>{
    row.classList.toggle("f-selected",_fileSelection.has(row.dataset.selName));
  });
  // Selection toolbar
  const barId=_chatFileMode?'filesSelBar2':'filesSelBar';
  const bar=document.getElementById(barId);
  // Also clear the other bar in chat mode
  if(_chatFileMode){const ob=document.getElementById('filesSelBar');if(ob){ob.classList.remove('active');ob.innerHTML='';}}
  if(bar){
    if(_fileSelection.size>0){
      bar.classList.add("active");
      bar.innerHTML=`<span class="sel-count">${_fileSelection.size} selected</span>`+
        `<button onclick="_selectAll('${id}')">Select All</button>`+
        `<button onclick="_clearSelection();_updateSelectionUI('${id}')">Deselect</button>`+
        `<button class="sel-danger" onclick="_deleteSelected('${id}')">Delete</button>`;
    } else {
      bar.classList.remove("active");
      bar.innerHTML='';
    }
  }
}
function _selectAll(id){
  _getSelectableItems(id).forEach(n=>_fileSelection.add(n));
  _updateSelectionUI(id);
}
async function _deleteSelected(id){
  const names=[..._fileSelection];
  if(!names.length)return;
  const ok=await _showConfirm('Delete '+names.length+' items?','This will delete:<br><br>'+names.map(n=>'• '+esc(n)).join('<br>'));
  if(!ok)return;
  const stateKey=_getCurrentStateKey();
  const filesDict=_getFilesDict(id);
  // Count total R2 deletes for progress bar
  let totalOps=0;
  const {items}=_resolveFilesPath(id);
  for(const name of names){
    const item=items.find(f=>f.name===name);
    if(item?.type==='folder'&&!item.locked){
      const fullPath=_filesPath.length===0?name:_filesPath.join('/')+'/'+name;
      const foldersArr=_getFoldersArray(id);
      const toDelete=foldersArr.filter(f=>f.name===fullPath||f.name.startsWith(fullPath+'/'));
      for(const uf of toDelete)totalOps+=(filesDict[uf.name]||[]).length;
    } else totalOps++;
  }
  const panel=totalOps>1?_showOperationProgress('Deleting',totalOps):null;
  let done=0;
  for(const name of names){
    const item=items.find(f=>f.name===name);
    if(item?.type==='folder'&&!item.locked){
      const fullPath=_filesPath.length===0?name:_filesPath.join('/')+'/'+name;
      const foldersArr=_getFoldersArray(id);
      const toDelete=foldersArr.filter(f=>f.name===fullPath||f.name.startsWith(fullPath+'/'));
      for(const uf of toDelete){
        const files=filesDict[uf.name]||[];
        for(const f of files){
          if(f.r2key)await r2Delete(f.r2key).catch(()=>{});
          done++;if(panel)_updateOperationProgress(panel,done,totalOps,f.name||'');
        }
        delete filesDict[uf.name];
      }
      _setFoldersArray(id,foldersArr.filter(f=>f.name!==fullPath&&!f.name.startsWith(fullPath+'/')));
      if(id==='__admin'){_ensureAdminState();delete state.__admin.shares[fullPath];}
      else _addFileHistory(id,'deleted',name,'');
    } else if(!item?.type||item?.type!=='folder'){
      if(id!=='__admin'&&stateKey==='versions/preview'){
        const versions=state[id]?.versions||[];
        const idx=versions.findIndex(v=>v.name===name);
        if(idx>=0){
          const v=versions[idx];
          if(v.url)await r2Delete(v.url.replace(CDN_BASE+'/','') ).catch(()=>{});
          if(v.thumb)await r2Delete(v.thumb.replace(CDN_BASE+'/','') ).catch(()=>{});
          versions.splice(idx,1);
        }
      } else if(stateKey){
        const entry=(filesDict[stateKey]||[]).find(f=>f.name===name);
        if(entry?.r2key)await r2Delete(entry.r2key).catch(()=>{});
        if(filesDict[stateKey])filesDict[stateKey]=filesDict[stateKey].filter(f=>f.name!==name);
      }
      done++;if(panel)_updateOperationProgress(panel,done,totalOps,name);
      if(id!=='__admin')_addFileHistory(id,'deleted',name,stateKey||'');
    }
  }
  if(panel)_removeOperationProgress(panel);
  _clearSelection();
  saveState(state);
  _renderShotFiles(id);
}
// === Upload Queue System ===
const _uploadQueue={shotId:null,items:[],processing:false,collapsed:false};
let _uqLastFullRender=0;

function _enqueueFiles(shotId,validatedList){
  if(_uploadQueue.shotId&&_uploadQueue.shotId!==shotId){
    // Different shot — clear old queue
    _uploadQueue.items=[];_uploadQueue.processing=false;
  }
  _uploadQueue.shotId=shotId;
  for(const v of validatedList){
    _uploadQueue.items.push({
      id:Date.now()+'-'+Math.random().toString(36).substr(2,6),
      file:v.file,r2Key:v.r2Key,stateKey:v.stateKey,
      fileName:v.file.name,size:v.file.size,
      status:'pending',progress:0,abort:null,startTime:null,
      meta:v.meta||{}
    });
  }
  _renderUploadQueue();
  if(!_uploadQueue.processing)_processQueue();
}
function _cancelQueueItem(itemId){
  const item=_uploadQueue.items.find(i=>i.id===itemId);
  if(!item)return;
  if(item.status==='pending')item.status='cancelled';
  else if(item.status==='uploading'){if(item.abort)item.abort();item.status='cancelled';}
  _updateQueueItemDOM(item);
  _updateQueueHeader();
}
function _cancelAllQueue(){
  for(const item of _uploadQueue.items){
    if(item.status==='pending')item.status='cancelled';
    else if(item.status==='uploading'){if(item.abort)item.abort();item.status='cancelled';}
  }
  // Full re-render since many items changed
  _renderUploadQueue();
}
async function _processQueue(){
  _uploadQueue.processing=true;
  while(true){
    const next=_uploadQueue.items.find(i=>i.status==='pending');
    if(!next)break;
    next.status='uploading';next.startTime=Date.now();
    _updateQueueItemDOM(next);
    const {promise,abort}=r2UploadXHRAbortable(next.r2Key,next.file,(pct)=>{
      next.progress=pct;
      _updateQueueProgress(next.id,pct);
    });
    next.abort=abort;
    const ok=await promise;
    if(next.status==='cancelled')continue;
    next.status=ok?'done':'failed';
    if(ok)_commitUploadedFile(next);
    _updateQueueItemDOM(next);
  }
  _uploadQueue.processing=false;
  _updateQueueHeader();
  // Re-render UI that was suppressed during upload (realtime handler skips while processing)
  render();
  if(_shotCurrentId&&_shotTab==='files')_renderShotFiles(_shotCurrentId);
  if(_shotCurrentId&&_shotTab==='versions')_renderShotBody(_shotCurrentId);
}
function _commitUploadedFile(item){
  const id=_uploadQueue.shotId;
  if(!id)return;
  if(id==='__admin'){
    // Admin file upload
    const filesDict=_getFilesDict(id);
    if(!filesDict[item.stateKey])filesDict[item.stateKey]=[];
    filesDict[item.stateKey].push({
      name:item.fileName,size:item.size,r2key:item.r2Key,
      author:currentUser?.display||currentUser?.id||'unknown',
      date:new Date().toISOString().slice(0,10)
    });
    _debouncedCommitFlush(id);
    return;
  }
  if(!state[id])state[id]={};
  if(item.meta.isVersion){
    // Version preview
    if(!state[id].versions)state[id].versions=[];
    state[id].versions.push({name:item.meta.versionName,baseName:item.meta.baseName,url:CDN_BASE+'/'+item.r2Key,thumb:null,ts:Date.now(),size:item.size||0});
    // Generate thumb async (don't block queue)
    const thumbKey="versions/"+id+"/thumb_"+item.meta.baseName+"_prev"+_formatVersion(item.meta.vNum)+".jpg";
    _generateThumbnail(CDN_BASE+"/"+item.r2Key,thumbKey).then(url=>{
      const v=state[id].versions.find(v=>v.name===item.meta.versionName);
      if(v)v.thumb=url;
      saveState(state);
    });
  } else {
    if(!state[id].files)state[id].files={};
    if(!state[id].files[item.stateKey])state[id].files[item.stateKey]=[];
    state[id].files[item.stateKey].push({
      name:item.fileName,size:item.size,r2key:item.r2Key,
      author:currentUser?.display||currentUser?.id||'unknown',
      date:new Date().toISOString().slice(0,10)
    });
  }
  _addFileHistory(id,'added',item.fileName,item.stateKey);
  _debouncedCommitFlush(id);
}
let _commitFlushTimer=null;
function _debouncedCommitFlush(id){
  if(_commitFlushTimer)clearTimeout(_commitFlushTimer);
  _commitFlushTimer=setTimeout(()=>{
    _commitFlushTimer=null;
    saveState(state);
    if(_shotCurrentId===id&&_shotTab==='files')_renderShotFiles(id);
  },500);
}
function _estimateTimeRemaining(){
  const curr=_uploadQueue.items.find(i=>i.status==='uploading');
  if(!curr||!curr.startTime||curr.progress<5)return '';
  const elapsed=(Date.now()-curr.startTime)/1000;
  const bps=(curr.size*(curr.progress/100))/elapsed;
  if(bps<=0)return '';
  let remaining=(curr.size*(1-curr.progress/100))/bps;
  for(const i of _uploadQueue.items){if(i.status==='pending')remaining+=i.size/bps;}
  if(remaining<60)return Math.ceil(remaining)+'s remaining';
  return Math.ceil(remaining/60)+'m remaining';
}
// Batch ALL queue DOM updates into one rAF — defer item updates while user scrolls
let _uqDirty=false;
let _uqScrolling=false,_uqScrollTimer=null;
function _uqBindScroll(listEl){
  if(!listEl||listEl._uqScrollBound)return;
  listEl._uqScrollBound=true;
  listEl.addEventListener('scroll',()=>{
    _uqScrolling=true;
    clearTimeout(_uqScrollTimer);
    _uqScrollTimer=setTimeout(()=>{_uqScrolling=false;_flushQueueDOM();},150);
  },{passive:true});
}
function _scheduleQueueUpdate(){if(_uqDirty)return;_uqDirty=true;requestAnimationFrame(()=>{_uqDirty=false;_flushQueueDOM();});}
function _updateQueueItemDOM(){_scheduleQueueUpdate();}
function _updateQueueHeader(){_scheduleQueueUpdate();}
function _updateQueueProgress(itemId,pct){const it=_uploadQueue.items.find(i=>i.id===itemId);if(it)it.progress=pct;_scheduleQueueUpdate();}
function _flushQueueDOM(){
  const panel=document.getElementById("uploadQueuePanel");
  if(!panel)return;
  const active=_uploadQueue.items.filter(i=>i.status!=='cancelled');
  const done=active.filter(i=>i.status==='done').length;
  // Header — always update (outside scroll container)
  const titleEl=panel.querySelector('.uq-title');
  if(titleEl){const t=(done===active.length?'Uploaded':'Uploading')+' '+done+'/'+active.length;if(titleEl.textContent!==t)titleEl.textContent=t;}
  const etaEl=panel.querySelector('.uq-eta');
  if(etaEl){const t=_uploadQueue.processing?(_estimateTimeRemaining()||'Uploading...'):'Done';if(etaEl.textContent!==t)etaEl.textContent=t;}
  const subEl=panel.querySelector('.uq-subtitle');
  if(subEl){const d=_uploadQueue.processing?'flex':'none';if(subEl.style.display!==d)subEl.style.display=d;}
  // Items — skip DOM mutations while user is scrolling (kills trackpad momentum)
  if(_uqScrolling)return;
  const listEl=panel.querySelector('.upload-queue-list');
  _uqBindScroll(listEl);
  for(const item of active){
    const el=panel.querySelector('[data-uq-id="'+item.id+'"]');
    if(!el)continue;
    const cls='uq-item '+(item.status==='done'?'uq-done':item.status==='uploading'?'uq-uploading':item.status==='failed'?'uq-failed':'uq-pending');
    if(el.className!==cls)el.className=cls;
    const iconEl=el.querySelector('.uq-icon');
    if(iconEl){const ic=item.status==='done'?'✅':item.status==='uploading'?'◌':item.status==='failed'?'❌':'⭕';if(iconEl.textContent!==ic)iconEl.textContent=ic;}
    const pctEl=el.querySelector('.uq-pct');
    if(pctEl){pctEl.textContent=item.status==='uploading'?item.progress+'%':'';pctEl.style.visibility=item.status==='uploading'?'visible':'hidden';}
    const xBtn=el.querySelector('.uq-x');
    if(xBtn)xBtn.style.visibility=(item.status==='pending'||item.status==='uploading')?'visible':'hidden';
  }
}
function _renderUploadQueue(){
  let panel=document.getElementById("uploadQueuePanel");
  const active=_uploadQueue.items.filter(i=>i.status!=='cancelled');
  if(active.length===0){
    if(panel)panel.remove();
    const cq=document.getElementById("chatUploadQueue");if(cq)cq.style.display='none';
    return;
  }
  if(!panel){
    panel=document.createElement("div");panel.id="uploadQueuePanel";panel.className="upload-queue-panel";
    if(_chatFileMode){
      const cq=document.getElementById("chatUploadQueue");
      if(cq){cq.style.display='';cq.appendChild(panel);}
      else document.body.appendChild(panel);
    } else {
      const shotOv=document.getElementById("shotOverlay");
      if(shotOv)shotOv.appendChild(panel);
      else document.body.appendChild(panel);
    }
  }
  // Preserve scroll position
  const list=panel.querySelector(".upload-queue-list");
  const scrollTop=list?list.scrollTop:0;
  const done=active.filter(i=>i.status==='done').length;
  const total=active.length;
  const eta=_estimateTimeRemaining();
  const collapsed=_uploadQueue.collapsed;
  let html=`<div class="upload-queue-header"><div class="uq-top">`;
  html+=`<span class="uq-title">${done===total?'Uploaded':'Uploading'} ${done}/${total}</span>`;
  html+=`<button class="uq-btn" onclick="_uploadQueue.collapsed=!_uploadQueue.collapsed;_renderUploadQueue()">${collapsed?'▸':'▾'}</button>`;
  html+=`<button class="uq-btn" onclick="_closeUploadQueue()">✕</button>`;
  html+=`</div>`;
  if(_uploadQueue.processing)html+=`<div class="uq-subtitle"><span class="uq-eta">${eta||'Preparing...'}</span><span class="uq-cancel" onclick="event.stopPropagation();_cancelAllQueue()">Cancel all</span></div>`;
  html+=`</div>`;
  html+=`<div class="upload-queue-list"${collapsed?' style="display:none"':''}>`;
  for(const item of active){
    let icon,cls='';
    if(item.status==='done'){icon='✅';cls='uq-done';}
    else if(item.status==='uploading'){icon='◌';cls='uq-uploading';}
    else if(item.status==='failed'){icon='❌';cls='uq-failed';}
    else{icon='⭕';cls='uq-pending';}
    const pctVis=item.status==='uploading'?'visible':'hidden';
    const xVis=(item.status==='pending'||item.status==='uploading')?'visible':'hidden';
    html+=`<div class="uq-item ${cls}" data-uq-id="${item.id}"><span class="uq-icon">${icon}</span><span class="uq-name" title="${esc(item.fileName)}">${esc(item.fileName)}</span><span class="uq-pct" style="visibility:${pctVis}">${item.progress}%</span><button class="uq-x" style="visibility:${xVis}" onclick="event.stopPropagation();_cancelQueueItem('${item.id}')">✕</button></div>`;
  }
  html+=`</div>`;
  panel.innerHTML=html;
  // Restore scroll + bind scroll guard
  const newList=panel.querySelector(".upload-queue-list");
  if(newList){newList.scrollTop=scrollTop;_uqBindScroll(newList);}
}
function _closeUploadQueue(){
  if(_uploadQueue.items.some(i=>i.status==='uploading')){
    _cancelAllQueue();
  }
  _uploadQueue.items=[];
  _renderUploadQueue();
}
function _toggleQueueCollapse(){_uploadQueue.collapsed=!_uploadQueue.collapsed;_renderUploadQueue();}

function _buildFileTip(id,name,size,editCell,date,icon){
  return ` data-tip="${esc(name)}" data-tip-size="${esc(size||'')}" data-tip-edit="${esc(editCell||'')}" data-tip-date="${esc(date||'')}" data-tip-icon="${esc(icon||'')}"`;
}

async function _deleteFolder(id,name){
  const fullPath=_filesPath.length===0?name:_filesPath.join('/')+'/'+name;
  const ok=await _showConfirm('Delete folder?','Delete <b>'+esc(name)+'</b> and all files inside?');
  if(!ok)return;
  const folders=_getFoldersArray(id);
  const filesDict=_getFilesDict(id);
  const toDelete=folders.filter(f=>f.name===fullPath||f.name.startsWith(fullPath+'/'));
  // Count total files to delete
  let totalFiles=0;
  for(const uf of toDelete) totalFiles+=(filesDict[uf.name]||[]).length;
  const panel=totalFiles>1?_showOperationProgress('Deleting files',totalFiles):null;
  let done=0;
  for(const uf of toDelete){
    const files=filesDict[uf.name]||[];
    for(const f of files){
      if(f.r2key) await r2Delete(f.r2key).catch(()=>{});
      done++;
      if(panel)_updateOperationProgress(panel,done,totalFiles,f.name||'');
    }
    delete filesDict[uf.name];
  }
  if(panel)_removeOperationProgress(panel);
  _setFoldersArray(id,folders.filter(f=>f.name!==fullPath&&!f.name.startsWith(fullPath+'/')));
  if(id==='__admin'){_ensureAdminState();delete state.__admin.shares[fullPath];}
  else _addFileHistory(id,'deleted',name,fullPath);
  saveState(state);
  _renderShotFiles(id);
}

// Detect if a file looks like it belongs to this shot (version preview or source)
// Returns: 'version' | 'source' | false
function _detectVersionFile(shotId,filename){
  const noExt=filename.replace(/\.[^.]+$/,'');
  const ext=(filename.split('.').pop()||'').toLowerCase();
  const videoExts=['mp4','webm','mov','avi','mkv','wmv','flv','mxf','ts','m4v','mpg','mpeg','3gp'];
  if(!videoExts.includes(ext))return false;

  const shotLower=shotId.toLowerCase().replace(/[_\-\s]/g,'');
  const fileLower=noExt.toLowerCase().replace(/[_\-\s]/g,'');

  // Check similarity to shotId
  const isSimilar=fileLower.startsWith(shotLower)||fileLower.includes(shotLower)||(()=>{
    let m=0;for(let i=0;i<Math.min(shotLower.length,fileLower.length);i++){if(shotLower[i]===fileLower[i])m++;else break;}
    return m>=shotLower.length*0.6;
  })();
  if(!isSimilar)return false;

  // Has _prev_v### or _v### → version preview
  if(/_prev_v\d{2,4}/i.test(noExt)||/_v\d{2,4}/i.test(noExt))return 'version';

  // Exact shotId match (no version suffix) → likely source or unversioned preview
  if(fileLower===shotLower)return 'source';

  // Similar to shotId but no version → could be source
  return 'source';
}
const _VIDEO_NATIVE=['mp4','webm'];
const _VIDEO_TRANSCODE=['mov','avi','mkv','wmv','flv','mxf','ts','m4v','mpg','mpeg','3gp'];
const _VIDEO_BLOCKED=['r3d','ari','braw','dng','crm','nef','cr2','cr3'];
const _SEQ_EXTS=['png','jpg','jpeg','exr','dpx','tif','tiff','tga','bmp','hdr','sgi','cin'];

function _validateSequenceFolder(shotId,folderName,files,targetKey){
  const idLower=shotId.toLowerCase();
  const fnLower=folderName.toLowerCase();
  // source/original: folder name = shotId
  if(targetKey==='source/original'){
    if(fnLower!==idLower)return{ok:false,error:'Folder must be named <b>'+esc(shotId)+'</b>, got <b>'+esc(folderName)+'</b>'};
    const badFiles=[];
    for(const f of files){
      const ext=(f.name.split('.').pop()||'').toLowerCase();
      if(!_SEQ_EXTS.includes(ext)){badFiles.push(f.name);continue;}
      const noExt=f.name.replace(/\.[^.]+$/,'');
      if(!noExt.toLowerCase().startsWith(idLower+'_'))badFiles.push(f.name);
    }
    if(badFiles.length)return{ok:false,error:'Files must be named <b>'+esc(shotId)+'_###.ext</b><br>Bad: '+badFiles.slice(0,3).map(n=>esc(n)).join(', ')+(badFiles.length>3?' +'+( badFiles.length-3)+' more':'')};
    return{ok:true};
  }
  // versions/final: folder name = shotId_v###
  if(targetKey==='versions/final'){
    const match=fnLower.match(new RegExp('^'+idLower.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'_v(\\d{3,4})$','i'));
    if(!match)return{ok:false,error:'Folder must be named <b>'+esc(shotId)+'_v###</b>, got <b>'+esc(folderName)+'</b>'};
    const badFiles=[];
    const prefix=folderName.toLowerCase();
    for(const f of files){
      const ext=(f.name.split('.').pop()||'').toLowerCase();
      if(!_SEQ_EXTS.includes(ext)){badFiles.push(f.name);continue;}
      const noExt=f.name.replace(/\.[^.]+$/,'');
      if(!noExt.toLowerCase().startsWith(prefix+'_'))badFiles.push(f.name);
    }
    if(badFiles.length)return{ok:false,error:'Files must be named <b>'+esc(folderName)+'_###.ext</b><br>Bad: '+badFiles.slice(0,3).map(n=>esc(n)).join(', ')+(badFiles.length>3?' +'+(badFiles.length-3)+' more':'')};
    return{ok:true};
  }
  return{ok:true};
}

// Validate + transcode a version preview file. Returns {ok, file, versionName} or {ok:false}
async function _validateAndPrepareVersion(shotId,file){
  const fileExt=(file.name.split('.').pop()||'').toLowerCase();
  if(_VIDEO_BLOCKED.includes(fileExt)){
    await _showAlert('Unsupported format','<b>.'+esc(fileExt)+'</b> is a proprietary RAW format and cannot be transcoded in browser.<br><br>Please render a preview in <b>H.264 .mp4</b> from your NLE/compositing app.<br><br>The original file can go to <b>Files → versions/final/</b>');
    return {ok:false};
  }
  if(!_VIDEO_NATIVE.includes(fileExt)&&!_VIDEO_TRANSCODE.includes(fileExt)){
    await _showAlert('Wrong format','<b>.'+esc(fileExt)+'</b> is not a video file.<br><br>Supported: <b>'+_VIDEO_NATIVE.concat(_VIDEO_TRANSCODE).join(', ')+'</b><br><br>For project files (.nk, .aep) and renders (.exr, .dpx) use <b>Files → versions/final/</b>');
    return {ok:false};
  }
  // Validate naming
  const v=_validateVersionFile(shotId,file.name);
  if(!v.ok){
    const err=v.errors[0];
    let msg='';
    if(err.detail) msg+=err.detail+'<br><br>';
    msg+=`<div style="font-family:'SF Mono',monospace;font-size:14px;margin:8px 0">`;
    msg+=`<div style="background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.2);border-radius:6px;padding:8px 12px;margin-bottom:6px">Your file: ${err.current}</div>`;

    if(!confirm)return {ok:false};
  }
  // Transcode if needed
  let uploadFile=file;

  if(_VIDEO_TRANSCODE.includes(fileExt)){

  }

async function _uploadFilesToR2(id,fileList){
  const stateKey=_getCurrentStateKey();
  if(!stateKey)return;
  const r2Folder=_getCurrentR2Folder(id);
  if(!r2Folder)return;
  const queue=[];// validated items to enqueue

  // Admin mode: simple upload, no version detection
  if(id==='__admin'){
    const filesDict=_getFilesDict(id);
    if(!filesDict[stateKey])filesDict[stateKey]=[];
    for(const file of fileList){
      if(filesDict[stateKey].some(f=>f.name===file.name))continue;
      queue.push({file,r2Key:r2Folder+'/'+file.name,stateKey,meta:{}});
    }
    if(queue.length)_enqueueFiles(id,queue);
    return;
  }

  // Version preview uploads
  if(stateKey==='versions/preview'){
    for(const file of fileList){
      const result=await _validateAndPrepareVersion(id,file);
      if(!result.ok)continue;
      queue.push({file:result.file,r2Key:"versions/"+id+"/"+result.versionName,stateKey,meta:{isVersion:true,versionName:result.versionName,baseName:result.baseName,vNum:result.vNum}});
    }
    if(queue.length)_enqueueFiles(id,queue);
    return;
  }

  // versions/final — must have _v### matching latest version
  if(stateKey==='versions/final'){
    const maxV=_getMaxVersion(id,id);
    if(maxV===0){await _showAlert('No versions yet','Upload a version preview first.');return;}
    for(const file of fileList){
      const {vNum}=_parseVersionName(file.name);
      if(vNum===0){
        await _showAlert('Missing version','Final render must include <b>_v###</b><br>Latest: <b>_v'+String(maxV).padStart(3,'0')+'</b><br>Example: <span style="color:#3fb950">'+esc(id)+'_v'+String(maxV).padStart(3,'0')+'.'+file.name.split('.').pop()+'</span>');
        continue;
      }
      if(vNum!==maxV){
        const ok=await _showConfirm('Version mismatch','File has <b>_v'+String(vNum).padStart(3,'0')+'</b> but latest is <b>_v'+String(maxV).padStart(3,'0')+'</b>. Continue?','Upload anyway');
        if(!ok)continue;
      }
      if(state[id]?.files?.[stateKey]?.some(f=>f.name===file.name)){await _showAlert('Duplicate',esc(file.name)+' already exists.');continue;}
      queue.push({file,r2Key:r2Folder+'/'+file.name,stateKey,meta:{}});
    }
    if(queue.length)_enqueueFiles(id,queue);
    return;
  }

  // Regular files with smart detection
  if(!state[id])state[id]={};
  if(!state[id].files)state[id].files={};
  if(!state[id].files[stateKey])state[id].files[stateKey]=[];
  for(const file of fileList){
    if(stateKey!=='versions/preview'&&stateKey!=='source/preview'&&stateKey!=='source/original'){
      const detected=_detectVersionFile(id,file.name);
      if(detected==='version'){
        const choice=await _showChoice('Version file detected',
          `<div style="font-family:'SF Mono',monospace;font-size:14px;background:#21262d;padding:8px 12px;border-radius:6px;margin:8px 0">${esc(file.name)}</div>Looks like a <b>version preview</b>. Where should it go?`,
          '→ versions/preview','Upload here anyway');
        if(choice===null)continue;
        if(choice==='a'){
          const result=await _validateAndPrepareVersion(id,file);
          if(!result.ok)continue;
          queue.push({file:result.file,r2Key:"versions/"+id+"/"+result.versionName,stateKey:'versions/preview',meta:{isVersion:true,versionName:result.versionName,baseName:result.baseName,vNum:result.vNum}});
          continue;
        }
      } else if(detected==='source'){
        const choice=await _showChoice('Source file detected',
          `<div style="font-family:'SF Mono',monospace;font-size:14px;background:#21262d;padding:8px 12px;border-radius:6px;margin:8px 0">${esc(file.name)}</div>Looks like a <b>source video</b>. Where should it go?`,
          '→ source/preview','Upload here anyway');
        if(choice===null)continue;
        if(choice==='a'){
          queue.push({file,r2Key:'files/'+id+'/source/preview/'+file.name,stateKey:'source/preview',meta:{}});
          continue;
        }
      }
    }
    if(state[id].files[stateKey]?.some(f=>f.name===file.name)){await _showAlert('Duplicate',esc(file.name)+' already exists.');continue;}
    queue.push({file,r2Key:r2Folder+'/'+file.name,stateKey,meta:{}});
  }
  if(queue.length)_enqueueFiles(id,queue);
}
