<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>KILLHOUSE VFX</h2>
    <p>Enter your password to continue</p>
    <input type="password" id="loginPass" placeholder="Password" autofocus>
    <button class="login-btn" onclick="tryLogin()">Log In</button>
    <div class="login-divider">or</div>
    <button class="guest-btn" onclick="guestLogin()">Continue as Guest (view only)</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="shot-overlay hidden" id="shotOverlay" onclick="if(event.target===this)closeShot()">
  <div class="shot-panel">
    <div class="shot-header">
      <span class="shot-header-id" id="shotId"></span>
      <span id="shotCatTag"></span>
      <span class="shot-header-desc" id="shotDesc"></span>
      <span class="shot-header-tc" id="shotTC"></span>
      <button class="shot-close" onclick="closeShot()">&times;</button>
    </div>
    <div class="shot-body" id="shotBody"></div>
  </div>
</div>

<div class="gif-overlay hidden" id="gifOverlay" onclick="if(event.target===this)closeGif()">
  <button class="gif-close-btn" onclick="closeGif()">&times;</button>
  <div class="gif-player-area" id="gifPlayerArea">
    <div id="playerShotLabel" style="font-size:20px;font-weight:700;color:#58a6ff;margin-bottom:8px;align-self:flex-start"></div>

      <div class="player-video-col">
        <div class="video-with-versions">
          <div class="player-versions-panel" id="playerVersionsPanel">
            <div class="pv-header" id="pvHeader">Versions</div>
            <div class="pv-list" id="pvList"></div>
          </div>
          <div class="video-col-inner">
            <div class="draw-toolbar">
              <button class="draw-btn" id="drawToggle" onclick="toggleDraw()">&#9998; Draw</button>
              <span class="draw-tools" id="drawTools">
                <button class="draw-btn active" id="drawTool_pen" onclick="setDrawTool('pen',this)">&#9998; Pen</button>
                <button class="draw-btn" id="drawTool_triangle" onclick="setDrawTool('triangle',this)">△ Triangle</button>
                <button class="draw-btn" id="drawTool_rect" onclick="setDrawTool('rect',this)">▭ Rect</button>
                <button class="draw-btn" id="drawTool_circle" onclick="setDrawTool('circle',this)">○ Circle</button>
                <button class="draw-btn" id="drawTool_arrow" onclick="setDrawTool('arrow',this)">→ Arrow</button>
                <button class="draw-color selected" id="dc_red" style="background:#f85149" onclick="setDrawColor('#f85149',this)"></button>
                <button class="draw-color" id="dc_yellow" style="background:#d29922" onclick="setDrawColor('#d29922',this)"></button>

                <button class="draw-color" id="dc_white" style="background:#ffffff" onclick="setDrawColor('#ffffff',this)"></button>
                <input type="range" class="draw-size" id="drawSize" min="2" max="16" value="4" title="Brush size">
                <button class="draw-btn" onclick="undoDraw()">&#8617; Undo</button>
                <button class="draw-btn" onclick="clearDraw()">&#10005; Clear</button>
              </span>
            </div>

            </div>
          </div>
        </div>

function _initRealtime(){
  const wsUrl=SUPA_URL.replace("https://","wss://")+"/realtime/v1/websocket?apikey="+SUPA_KEY+"&vsn=1.0.0";
  let ws,heartbeat;
  function connect(){
    ws=new WebSocket(wsUrl);
    ws.onopen=()=>{
      // Join channel
      ws.send(JSON.stringify({topic:"realtime:public:tracker_state",event:"phx_join",payload:{config:{broadcast:{self:false},postgres_changes:[{event:"UPDATE",schema:"public",table:"tracker_state",filter:"id=eq.main"}]}},ref:"1"}));
      // Heartbeat every 30s
      heartbeat=setInterval(()=>{ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:"hb"}));},30000);
    };
    ws.onmessage=(ev)=>{
      try{
        const msg=JSON.parse(ev.data);
        if(msg.event==="postgres_changes"&&msg.payload?.data?.record?.data){
          const remote=msg.payload.data.record.data;
          if(JSON.stringify(remote)!==JSON.stringify(state)){
            state=remote;
            localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
            runMigrations();render();
            if(_gifCurrentId)renderPlayerNotes();

      }catch(e){}
    };
    ws.onclose=()=>{clearInterval(heartbeat);setTimeout(connect,3000);};
    ws.onerror=()=>{ws.close();};
  }
  connect();
}

function _generateKey(len){
  const chars="ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";
  let r="";for(let i=0;i<len;i++)r+=chars[Math.floor(Math.random()*chars.length)];
  return r;
}
async function addUser(){
  const inp=document.getElementById("newUserName");
  const name=inp?.value.trim();
  const role="artist";
  if(!name)return;
  const id=name.toLowerCase().replace(/[^a-z0-9]/g,"_");
  if(!id)return;
  if(USERS[id]){alert("User with this ID already exists");return;}
  const key=_generateKey(12);
  const hash=await sha256(key);
  USERS[id]={hash,display:name,role};
  if(!state.__users)state.__users={};
  state.__users[id]={hash,display:name,role,plainKey:key};
  if(role==="artist"){
    const artists=_getArtists();
    artists.push({id,display:name});
    state.__artists=artists;
  }
  saveState(state);
  inp.value="";
  document.getElementById("generatedKeyBox").innerHTML=`<div class="generated-key"><code>${key}</code><button onclick="navigator.clipboard.writeText('${key}');this.textContent='Copied!'">Copy</button></div><div style="color:#8b949e;font-size:11px;margin-top:4px">${esc(name)} uses this key to log in.</div>`;

  render();
}
async function regenKey(id){

  if(!state.__users)state.__users={};
  if(!state.__users[id])state.__users[id]={...USERS[id]};

function renderMsgContent(text, mid) {
  // Check if message contains todo items: lines starting with - [ ] or - [x]
  const lines = text.split('\n');
  const hasTodo = lines.some(l => /^\s*-\s*\[([ xX])\]/.test(l));
  if (!hasTodo) return `<div>${esc(text)}</div>`;

  let html = '<ul class="chat-todo">';
  let lineIdx = 0;
  for (const line of lines) {
    const todoMatch = line.match(/^\s*-\s*\[([ xX])\]\s*(.*)/);
    if (todoMatch) {
      const checked = todoMatch[1].toLowerCase() === 'x';
      const label = todoMatch[2];
      const canToggle = canChat(noteTaskId);
      html += `<li>`;
      html += `<button class="chat-todo-check${checked?' checked':''}" ${canToggle?`onclick="toggleTodo(${mid},${lineIdx})"`:''} title="${checked?'Uncheck':'Check'}">${checked?'&#10003;':''}</button>`;
      html += `<span class="chat-todo-text${checked?' done':''}">${esc(label)}</span>`;
      html += `</li>`;
    } else if (line.trim()) {
      html += `<li><span class="chat-todo-text">${esc(line)}</span></li>`;
    }
    lineIdx++;
  }
  html += '</ul>';
  return html;
}

function toggleTodo(mid, lineIdx) {
  const msgs = getChat(noteTaskId);
  const m = msgs.find(x => x.id === mid);
  if (!m || m.deleted) return;
  const lines = m.text.split('\n');
  if (lineIdx >= lines.length) return;
  const line = lines[lineIdx];
  const match = line.match(/^(\s*-\s*\[)([ xX])(\]\s*.*)/);
  if (!match) return;
  const newCheck = match[2].toLowerCase() === 'x' ? ' ' : 'x';
  lines[lineIdx] = match[1] + newCheck + match[3];
  m.text = lines.join('\n');
  saveState(state);
  renderChat();
  render();
}

function renderChat(){
  const msgs=getChat(noteTaskId),canSend=canChat(noteTaskId);
  const body=document.getElementById("notePanelBody");
  let html='<div class="chat-messages" id="chatMessages">';
  if(!msgs.length) html+='<div class="chat-empty">No messages yet</div>';
  else msgs.forEach(m=>{
    const isAdm=m.author==="admin",isCli=m.author==="client",cls=isAdm?"from-admin":isCli?"from-client":"from-artist";
    const del=m.deleted;
    html+=`<div class="chat-msg ${cls}${del?' deleted':''}" data-mid="${m.id}">`;
    if(!del&&!isGuest()){
      const isOwn=(isAdmin()&&m.author==="admin")||(isArtist()&&m.author==="artist")||(isClient()&&m.author==="client");
      html+=`<div class="chat-msg-actions">`;
      // Reply — anyone logged in, to any message including own
      if(canSend) html+=`<div class="chat-action-btn" onclick="replyTo(${m.id})" title="Reply">↩</div>`;
      if(isOwn) html+=`<div class="chat-action-btn" onclick="editMsg(${m.id})" title="Edit">✎</div>`;
      if(isAdmin()||isOwn) html+=`<div class="chat-action-btn" onclick="deleteMsg(${m.id})" title="Delete">✕</div>`;
      html+=`</div>`;
    }
    const timeStr=m.ts?new Date(m.ts).toLocaleString('uk-UA',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    const authorName=isAdm?'Admin':isCli?'Client':'Artist';
    html+=`<div class="chat-msg-header">${authorName}${timeStr?' &nbsp;<span style="opacity:0.5;font-weight:400">'+timeStr+'</span>':''}</div>`;
    if(m.replyTo!==undefined&&m.replyTo!==null){
      const orig=msgs.find(x=>x.id===m.replyTo);
      const preview=orig?(orig.deleted?'deleted message':trunc(orig.text,40)):'...';
      html+=`<div class="chat-msg-reply" onclick="scrollToMsg(${m.replyTo})">${esc(preview)}</div>`;
    }
    if(del){
      html+=`<span class="chat-deleted-label">message deleted</span>`;
      if(isAdmin()) html+=`<button class="chat-restore-btn" onclick="restoreMsg(${m.id})">restore</button>`;
    } else {
      html+=renderMsgContent(m.text, m.id);
      if(m.edited) html+=`<div class="chat-edited-mark">edited</div>`;
    }
    html+=`</div>`;
  });
  html+='</div>';
  if(canSend){
    html+=`<div class="chat-input-area">`;
    html+=`<div class="chat-editing-hint${editingMsgId!==null?'':' hidden'}" id="chatEditHint"><span>Editing message...</span><button class="chat-editing-close" onclick="cancelEdit()">&times;</button></div>`;
    html+=`<div class="chat-reply-preview hidden" id="chatReplyPreview"><span id="chatReplyText"></span><button class="chat-reply-close" onclick="cancelReply()">&times;</button></div>`;
    html+=`<div class="chat-input-row"><button class="chat-todo-btn${todoMode?' active':''}" onclick="toggleTodoMode()" title="Todo list builder">&#9745;</button><textarea id="chatTA" placeholder="${todoMode?'Each line = todo item. Enter to send list.':'Enter to send, Shift+Enter for new line...'}" rows="1"></textarea><button class="chat-send-btn" onclick="sendChat()">&#9654;</button></div>`;
    html+=`<div class="chat-hint">${todoMode?'Todo mode: each Shift+Enter = new item &nbsp;|&nbsp; Enter — send list':'Enter — send &nbsp;|&nbsp; Shift+Enter — new line &nbsp;|&nbsp; &#9745; — todo builder'}</div>`;
    html+=`</div>`;
  }
  body.innerHTML=html;
  // Auto-scroll to bottom
  setTimeout(()=>{const c=document.getElementById("chatMessages");if(c)c.scrollTop=c.scrollHeight;},30);
  // Bind Enter key
  const ta=document.getElementById("chatTA");
  if(ta){
    ta.addEventListener("keydown",e=>{
      if(todoMode){
        if(e.key==="Enter"&&e.shiftKey){
          // Add new todo item
          e.preventDefault();
          const pos=ta.selectionStart;
          ta.value=ta.value.substring(0,pos)+"\n○ "+ta.value.substring(ta.selectionEnd);
          ta.selectionStart=ta.selectionEnd=pos+3;
          ta.dispatchEvent(new Event("input"));
        } else if(e.key==="Enter"&&!e.shiftKey){
          e.preventDefault();sendChat();
        }
      } else {
        if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}
      }
    });
    ta.addEventListener("input",()=>{ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,150)+"px";});
    ta.focus();
  }
}

function toggleTodoMode(){
  const ta=document.getElementById("chatTA");
  const savedText=ta?ta.value:'';
  todoMode=!todoMode;
  renderChat();
  setTimeout(()=>{
    const t=document.getElementById("chatTA");
    if(!t)return;
    if(todoMode){
      if(!savedText.trim()) t.value="○ ";
      else t.value=savedText;
    } else {
      t.value=savedText;
    }
    t.focus();t.setSelectionRange(t.value.length,t.value.length);
    t.dispatchEvent(new Event("input"));
  },50);
}

function sendChat(){
  const ta=document.getElementById("chatTA");if(!ta)return;
  let text=ta.value.trim();if(!text)return;
  // Convert visual ○/● back to - [ ]/- [x], and auto-prefix plain lines in todo mode
  if(todoMode){
    text=text.split('\n').map(l=>{
      let trimmed=l.trim();
      if(!trimmed)return '';
      // Convert visual circles to markdown
      if(trimmed.startsWith('○ '))return '- [ ] '+trimmed.substring(2);
      if(trimmed.startsWith('● '))return '- [x] '+trimmed.substring(2);
      if(/^\s*-\s*\[([ xX])\]/.test(trimmed))return trimmed;
      return '- [ ] '+trimmed;
    }).filter(Boolean).join('\n');
    if(!text)return;
  }
  if(!state[noteTaskId])state[noteTaskId]={};
  if(!state[noteTaskId].artistNotes)state[noteTaskId].artistNotes=[];
  if(editingMsgId!==null){
    // Edit existing message
    const m=state[noteTaskId].artistNotes.find(x=>x.id===editingMsgId);
    if(m){m.text=text;m.edited=true;}
    editingMsgId=null;
  } else {
    const author=isAdmin()?"admin":isClient()?"client":"artist";
    const msg={id:nextMsgId(noteTaskId),author,text,replyTo:replyToId,ts:Date.now()};
    state[noteTaskId].artistNotes.push(msg);
  }
  replyToId=null;
  if(todoMode)todoMode=false;
  saveState(state);
  renderChat();
  render();
}

function deleteMsg(mid){
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  if(!m)return;
  const isOwn=(isArtist()&&m.author==="artist")||(isClient()&&m.author==="client");
  if(isAdmin()||isOwn){
    m.deletedText=m.text; // preserve for admin restore
    m.deleted=true;m.text="";
    saveState(state);
    renderChat();
    render();
  }
}

function restoreMsg(mid){
  if(!isAdmin())return;
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  if(!m||!m.deleted)return;
  m.text=m.deletedText||"[restored]";
  m.deleted=false;
  delete m.deletedText;
  saveState(state);
  renderChat();
  render();
}

function editMsg(mid){
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  if(!m||m.deleted)return;
  editingMsgId=mid;
  renderChat();
  setTimeout(()=>{
    const ta=document.getElementById("chatTA");
    if(ta){ta.value=m.text;ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);ta.dispatchEvent(new Event("input"));}
  },50);
}

function cancelEdit(){
  editingMsgId=null;
  renderChat();
}

function replyTo(mid){
  replyToId=mid;
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  const prev=document.getElementById("chatReplyPreview");

}

function _tcToFrames(tc){
  if(!tc||tc==="—")return 0;
  const p=tc.split(":");
  if(p.length!==4)return 0;
  return parseInt(p[0])*3600*25+parseInt(p[1])*60*25+parseInt(p[2])*25+parseInt(p[3]);
}
function _framesToTc(f){
  const ff=f%25;const s=Math.floor(f/25)%60;const m=Math.floor(f/1500)%60;const h=Math.floor(f/90000);
  return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+":"+String(ff).padStart(2,"0");
}
function _getFrameTC(frame){
  if(!_gifCurrentId)return"";
  const task=TASKS.find(t=>t.id===_gifCurrentId);
  if(!task)return"";
  const vid=_vid();
  const inF=_tcToFrames(task.tcIn),outF=_tcToFrames(task.tcOut);
  const totalFrames=Math.round(vid.duration*_videoFPS)||1;
  const currentAbsolute=inF+Math.round(frame*(outF-inF)/(totalFrames-1||1));
  return _framesToTc(currentAbsolute);
}
function _currentFrame(){

  return Math.round(vid.currentTime*_videoFPS);

function _totalFrames(){

// --- DRAWING ---
function _getVideoRect(){
  // Compute the actual rendered video area inside the object-fit:contain container
  const vid=_vid();
  if(!vid||!vid.videoWidth||!vid.videoHeight)return null;
  const cw=vid.offsetWidth, ch=vid.offsetHeight;
  const vw=vid.videoWidth, vh=vid.videoHeight;
  const scale=Math.min(cw/vw, ch/vh);
  const rw=vw*scale, rh=vh*scale;
  const ox=(cw-rw)/2, oy=(ch-rh)/2;
  return {left:ox, top:oy, width:rw, height:rh};
}
function _initDrawCanvas(){
  const wrap=document.getElementById("videoWrap");
  const vid=_vid();
  if(!wrap||!vid)return;
  const old=document.getElementById("drawCanvas");
  if(old)old.remove();
  const cv=document.createElement("canvas");
  cv.id="drawCanvas";
  cv.width=vid.videoWidth||vid.offsetWidth;
  cv.height=vid.videoHeight||vid.offsetHeight;
  const vr=_getVideoRect();
  if(vr){
    cv.style.position="absolute";
    cv.style.left=vr.left+"px";
    cv.style.top=vr.top+"px";
    cv.style.width=vr.width+"px";
    cv.style.height=vr.height+"px";
  } else {
    const rect=vid.getBoundingClientRect();
    cv.style.width=rect.width+"px";
    cv.style.height=rect.height+"px";
  }
  wrap.appendChild(cv);
  _drawCanvas=cv;_drawCtx=cv.getContext("2d");
  // Mouse events
  cv.addEventListener("mousedown",e=>{e.stopPropagation();_drawStart(e);});
  cv.addEventListener("mousemove",_drawMove);
  cv.addEventListener("mouseup",_drawEnd);
  cv.addEventListener("mouseleave",_drawEnd);
  // Touch events
  cv.addEventListener("touchstart",e=>{e.preventDefault();_drawStart(_touchToMouse(e));},{passive:false});
  cv.addEventListener("touchmove",e=>{e.preventDefault();_drawMove(_touchToMouse(e));},{passive:false});
  cv.addEventListener("touchend",_drawEnd);
  // Load existing drawings from state
  _loadDrawingsForFrame();
  _redrawAll();
  _updateMarkers();
}

function _touchToMouse(e){
  const t=e.touches[0];const r=e.target.getBoundingClientRect();
  return{offsetX:t.clientX-r.left,offsetY:t.clientY-r.top};
}

function _getDrawPos(e){
  if(!_drawCanvas)return{x:0,y:0};
  const rect=_drawCanvas.getBoundingClientRect();
  const scaleX=_drawCanvas.width/rect.width;
  const scaleY=_drawCanvas.height/rect.height;
  return{x:(e.offsetX||e.clientX-rect.left)*scaleX, y:(e.offsetY||e.clientY-rect.top)*scaleY};
}

function _drawStart(e){
  if(!_drawMode)return;
  if(!_gifPaused)toggleGifPause();
  _drawing=true;
  const pos=_getDrawPos(e);
  const size=parseInt(document.getElementById("drawSize").value);
  _shapeStart=pos;
  if(_drawTool==="pen"){
    _currentStroke={tool:"pen",color:_drawColor,width:size,points:[pos]};
    _drawCtx.beginPath();_drawCtx.strokeStyle=_drawColor;_drawCtx.lineWidth=size;
    _drawCtx.lineCap="round";_drawCtx.lineJoin="round";_drawCtx.moveTo(pos.x,pos.y);
  } else {
    _currentStroke={tool:_drawTool,color:_drawColor,width:size,start:pos,end:pos};
  }
}

function _drawMove(e){
  if(!_drawing||!_currentStroke)return;
  const pos=_getDrawPos(e);
  if(_drawTool==="pen"){
    _currentStroke.points.push(pos);
    _drawCtx.lineTo(pos.x,pos.y);_drawCtx.stroke();
    _drawCtx.beginPath();_drawCtx.moveTo(pos.x,pos.y);
  } else {
    _currentStroke.end=pos;
    _redrawAll();
    _drawShape(_currentStroke);
  }
}

function _drawEnd(){
  if(!_drawing)return;
  _drawing=false;
  if(_currentStroke){
    if(_drawTool==="pen"&&_currentStroke.points&&_currentStroke.points.length>1){
      _drawStrokes.push(_currentStroke);_saveDrawings();
      addDrawingNote(_drawTool,_drawColor);
    } else if(_drawTool!=="pen"&&_currentStroke.start&&_currentStroke.end){
      const dx=_currentStroke.end.x-_currentStroke.start.x;
      const dy=_currentStroke.end.y-_currentStroke.start.y;
      if(Math.abs(dx)+Math.abs(dy)>5){_drawStrokes.push(_currentStroke);_saveDrawings();addDrawingNote(_drawTool,_drawColor);}
      else _redrawAll();
    }
  }
  _currentStroke=null;_shapeStart=null;
}

function _drawShape(s){
  const ctx=_drawCtx;
  ctx.strokeStyle=s.color;ctx.lineWidth=s.width;ctx.lineCap="round";ctx.lineJoin="round";
  const x1=s.start.x,y1=s.start.y,x2=s.end.x,y2=s.end.y;
  ctx.beginPath();
  if(s.tool==="triangle"){
    const cx=(x1+x2)/2;
    ctx.moveTo(cx,Math.min(y1,y2));
    ctx.lineTo(Math.min(x1,x2),Math.max(y1,y2));
    ctx.lineTo(Math.max(x1,x2),Math.max(y1,y2));
    ctx.closePath();
  } else if(s.tool==="rect"){
    ctx.rect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1));
  } else if(s.tool==="circle"){
    const rx=Math.abs(x2-x1)/2,ry=Math.abs(y2-y1)/2;
    const cx=Math.min(x1,x2)+rx,cy=Math.min(y1,y2)+ry;
    ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  } else if(s.tool==="arrow"){
    ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    // Arrowhead
    const angle=Math.atan2(y2-y1,x2-x1);const hl=Math.max(s.width*6,24);
    ctx.beginPath();
    ctx.moveTo(x2-hl*Math.cos(angle-0.4),y2-hl*Math.sin(angle-0.4));
    ctx.lineTo(x2,y2);
    ctx.lineTo(x2-hl*Math.cos(angle+0.4),y2-hl*Math.sin(angle+0.4));
  }
  ctx.stroke();
}

function _redrawAll(){
  if(!_drawCtx||!_drawCanvas)return;
  _drawCtx.clearRect(0,0,_drawCanvas.width,_drawCanvas.height);
  _drawStrokes.forEach(s=>{
    if(s.tool&&s.tool!=="pen"){_drawShape(s);return;}
    if(!s.points||s.points.length<2)return;
    _drawCtx.beginPath();_drawCtx.strokeStyle=s.color;_drawCtx.lineWidth=s.width;
    _drawCtx.lineCap="round";_drawCtx.lineJoin="round";
    _drawCtx.moveTo(s.points[0].x,s.points[0].y);
    for(let i=1;i<s.points.length;i++)_drawCtx.lineTo(s.points[i].x,s.points[i].y);
    _drawCtx.stroke();
  });
}

function toggleDraw(){

      cv.classList.add("active");
    }
  } else {
    btn.classList.remove("active");
    if(tools)tools.classList.remove("visible");
    if(cv)cv.classList.remove("active");
  }
}

function undoDraw(){

function clearDraw(){

function _currentFrame(){
  const vid=_vid();
  return Math.round(vid.currentTime*_videoFPS);
}

function _getDrawingsStore(){
  if(!_gifCurrentId)return null;
  if(_gifVersionIdx>=0){
    const v=(state[_gifCurrentId]?.versions||[])[_gifVersionIdx];
    if(!v)return null;
    if(!v.drawings)v.drawings={};
    return v.drawings;
  }
  if(!state[_gifCurrentId])state[_gifCurrentId]={};
  if(!state[_gifCurrentId].drawings)state[_gifCurrentId].drawings={};
  return state[_gifCurrentId].drawings;
}
function _saveDrawings(){
  const allDrawings=_getDrawingsStore();
  if(!allDrawings)return;
  const frame=_currentFrame();
  if(_drawStrokes.length){
    allDrawings[frame]=_drawStrokes.map(s=>{
      if(s.tool&&s.tool!=="pen"){
        return{t:s.tool,c:s.color,w:s.width,s:[Math.round(s.start.x),Math.round(s.start.y)],e:[Math.round(s.end.x),Math.round(s.end.y)]};
      }
      return{t:"pen",c:s.color,w:s.width,p:s.points.map(pt=>[Math.round(pt.x),Math.round(pt.y)])};
    });
  } else {
    delete allDrawings[frame];
  }
  saveState(state);
  _updateMarkers();
}

function _loadDrawingsForFrame(){
  _drawStrokes=[];
  const allDrawings=_getDrawingsStore();
  if(!allDrawings)return;
  // Migrate: if array (old format), convert to frame 0
  if(_gifVersionIdx<0&&Array.isArray(allDrawings)){
    state[_gifCurrentId].drawings={"0":allDrawings};
    return _loadDrawingsForFrame();
  }
  const frame=_currentFrame();
  const compact=allDrawings[frame];
  if(!compact)return;
  _drawStrokes=compact.map(s=>{
    if(s.t&&s.t!=="pen"){
      return{tool:s.t,color:s.c,width:s.w,start:{x:s.s[0],y:s.s[1]},end:{x:s.e[0],y:s.e[1]}};
    }
    return{tool:"pen",color:s.c,width:s.w,points:(s.p||[]).map(pt=>({x:pt[0],y:pt[1]}))};
  });
}

function _switchFrame(){
  _loadDrawingsForFrame();
  _redrawAll();
}

function _updateMarkers(){
  const container=document.getElementById("scrubberMarkers");
  if(!container||!_gifCurrentId)return;
  const total=_totalFrames();
  if(!total)return;
  container.innerHTML="";
  const frames=new Set();
  const notes=_getPlayerNotes();
  for(const n of notes){
    if(n.frame!=null)frames.add(n.frame);
  }
  const scrub=document.getElementById("gifScrubber");
  const maxVal=parseFloat(scrub.max)||1;
  for(const frame of frames){
    const val=Math.round(frame/_videoFPS*1000);
    const frac=val/maxVal;
    container.innerHTML+=`<div class="scrubber-marker" style="left:calc(8px + (100% - 16px) * ${frac})" onclick="seekToNoteFrame(${frame})" title="Frame ${frame}"></div>`;
  }
}

function _getNotesStore(){
  // Returns the array reference for current context (original or version)
  if(!_gifCurrentId)return null;
  if(_gifVersionIdx>=0){
    const v=(state[_gifCurrentId]?.versions||[])[_gifVersionIdx];
    if(!v)return null;
    if(!v.notes)v.notes=[];
    return v.notes;
  }
  if(!state[_gifCurrentId])state[_gifCurrentId]={};
  if(!state[_gifCurrentId].playerNotes)state[_gifCurrentId].playerNotes=[];
  return state[_gifCurrentId].playerNotes;
}
function _getPlayerNotes(){
  return _getNotesStore()||[];
}
function _nextPnId(){

}
function renderPlayerNotes(){
  const list=document.getElementById("pnList");
  const count=document.getElementById("pnCount");
  if(!list)return;
  const notes=_getPlayerNotes();
  count.textContent=notes.length||"";

  if(title)title.textContent=_gifVersionIdx>=0?"Version "+((_gifVersionIdx)+1)+" Notes":"Notes";
  if(!notes.length){list.innerHTML='<div class="pn-empty">No notes yet. Draw or type to add.</div>';return;}
  list.innerHTML=notes.map(n=>{
    const tcHtml=n.tc?`<span class="pn-tc" onclick="seekToNoteFrame(${n.frame})">${n.tc}</span>`:'';
    const drawHtml=n.drawing?`<span class="pn-color-dot" style="background:${n.drawing.color}"></span><span class="pn-shape">${TOOL_ICONS[n.drawing.tool]||''}</span>`:'';
    const textClass=n.text?'pn-text':'pn-text placeholder';

function _compileNotesToDesc(){
  if(!_gifCurrentId)return;
  if(!state[_gifCurrentId])state[_gifCurrentId]={};
  const notes=_getPlayerNotes();
  // Keep original description from the task table
  const task=TASKS.find(t=>t.id===_gifCurrentId);
  const original=task?task.desc:'';
  const existing=state[_gifCurrentId].desc||original||'';
  const marker='--- Notes ---';
  const base=existing.split(marker)[0].trim();
  if(!notes.length){
    // All notes deleted — remove notes section, keep original
    state[_gifCurrentId].desc=base;
    saveState(state);
    return;
  }
  // Build new notes text
  const lines=notes.map(n=>{
    let prefix=n.tc?'['+n.tc+'] ':'';
    if(n.drawing)prefix+=(TOOL_ICONS[n.drawing.tool]||'')+' ';
    return prefix+(n.text||'(no description)');
  }).join('\n');
  state[_gifCurrentId].desc=base?(base+'\n'+marker+'\n'+lines):(marker+'\n'+lines);
  saveState(state);
}

async function r2Delete(key){
  const now=new Date();
  const amzDate=now.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const dateStamp=amzDate.substring(0,8);
  const region="auto",service="s3";
  const host=new URL(R2_ENDPOINT).host;
  const path="/"+R2_BUCKET+"/"+key;
  const headers={"host":host,"x-amz-content-sha256":"UNSIGNED-PAYLOAD","x-amz-date":amzDate};
  const signedHeaders=Object.keys(headers).sort().join(";");
  const canonicalHeaders=Object.keys(headers).sort().map(k=>k+":"+headers[k]).join("\n")+"\n";
  const canonicalRequest=["DELETE",path,"",canonicalHeaders,signedHeaders,"UNSIGNED-PAYLOAD"].join("\n");
  const scope=dateStamp+"/"+region+"/"+service+"/aws4_request";
  const stringToSign=["AWS4-HMAC-SHA256",amzDate,scope,await _sha256hex(canonicalRequest)].join("\n");
  const signingKey=await _getSigningKey(R2_SECRET_KEY,dateStamp,region,service);
  const sig=[...await _hmac(signingKey,stringToSign)].map(b=>b.toString(16).padStart(2,"0")).join("");
  const auth="AWS4-HMAC-SHA256 Credential="+R2_ACCESS_KEY+"/"+scope+", SignedHeaders="+signedHeaders+", Signature="+sig;
  return fetch(R2_ENDPOINT+path,{method:"DELETE",headers:{...headers,"Authorization":auth}});
}

const R2_ACCESS_KEY="d9fd350d6e623ab85ccb0a58930a35d8";
const R2_SECRET_KEY="4498ba8839c82bd88fd4a9d3e4d9edb44268ff73a646d818314d6df8be6eb1f8";
const R2_ENDPOINT="https://6b4341dd25b4f283d53ad86424e39e74.r2.cloudflarestorage.com";
const R2_BUCKET="kh-vfx-video";

async function _hmac(key,msg){
  const k=typeof key==="string"?new TextEncoder().encode(key):key;
  const cryptoKey=await crypto.subtle.importKey("raw",k,{name:"HMAC",hash:"SHA-256"},false,["sign"]);
  return new Uint8Array(await crypto.subtle.sign("HMAC",cryptoKey,new TextEncoder().encode(msg)));
}
async function _sha256hex(str){
  const hash=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return[...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function _getSigningKey(secret,date,region,service){
  let k=await _hmac("AWS4"+secret,date);
  k=await _hmac(k,region);k=await _hmac(k,service);k=await _hmac(k,"aws4_request");return k;
}
const _uploads={};// shotId → {name,pct,done,error}

async function _signR2(key,contentType){
  const now=new Date();
  const amzDate=now.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const dateStamp=amzDate.substring(0,8);
  const region="auto",service="s3";
  const host=new URL(R2_ENDPOINT).host;
  const path="/"+R2_BUCKET+"/"+key;
  const headers={"host":host,"x-amz-content-sha256":"UNSIGNED-PAYLOAD","x-amz-date":amzDate,"content-type":contentType};
  const signedHeaders=Object.keys(headers).sort().join(";");
  const canonicalHeaders=Object.keys(headers).sort().map(k=>k+":"+headers[k]).join("\n")+"\n";
  const canonicalRequest=["PUT",path,"",canonicalHeaders,signedHeaders,"UNSIGNED-PAYLOAD"].join("\n");
  const scope=dateStamp+"/"+region+"/"+service+"/aws4_request";
  const stringToSign=["AWS4-HMAC-SHA256",amzDate,scope,await _sha256hex(canonicalRequest)].join("\n");
  const signingKey=await _getSigningKey(R2_SECRET_KEY,dateStamp,region,service);
  const sig=[...await _hmac(signingKey,stringToSign)].map(b=>b.toString(16).padStart(2,"0")).join("");
  const auth="AWS4-HMAC-SHA256 Credential="+R2_ACCESS_KEY+"/"+scope+", SignedHeaders="+signedHeaders+", Signature="+sig;
  return{url:R2_ENDPOINT+path,headers:{...headers,"Authorization":auth}};
}

function r2UploadXHR(key,file,onProgress){
  return new Promise(async(resolve)=>{
    const ct=file.type||"video/mp4";
    const signed=await _signR2(key,ct);
    const xhr=new XMLHttpRequest();
    xhr.open("PUT",signed.url);
    Object.entries(signed.headers).forEach(([k,v])=>xhr.setRequestHeader(k,v));
    xhr.upload.onprogress=(e)=>{if(e.lengthComputable&&onProgress)onProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=()=>resolve(xhr.status>=200&&xhr.status<300);
    xhr.onerror=()=>resolve(false);
    xhr.send(file);
  });
}

async function _generateThumbnail(videoUrl,thumbKey){
  return new Promise((resolve)=>{
    const vid=document.createElement("video");
    vid.crossOrigin="anonymous";
    vid.muted=true;vid.preload="auto";
    vid.addEventListener("loadeddata",()=>{
      vid.currentTime=0.1;
    });
    vid.addEventListener("seeked",()=>{
      try{
        const cv=document.createElement("canvas");
        cv.width=vid.videoWidth;cv.height=vid.videoHeight;
        cv.getContext("2d").drawImage(vid,0,0);
        cv.toBlob(async(blob)=>{
          if(!blob){resolve(null);return;}
          const ok=await r2UploadXHR(thumbKey,blob);
          vid.remove();
          resolve(ok?CDN_BASE+"/"+thumbKey:null);
        },"image/jpeg",0.8);
      }catch(e){vid.remove();resolve(null);}
    },{once:true});
    vid.addEventListener("error",()=>{vid.remove();resolve(null);});
    vid.src=videoUrl;
    setTimeout(()=>{vid.remove();resolve(null);},15000);
  });
}

function render(){
  const tbody=document.getElementById("tbody");
  let rows=TASKS.map((t,i)=>({...t,idx:i+1,status:getStatus(t.id),assignee:getAssignee(t.id)}));
  if(searchQuery){const q=searchQuery.toLowerCase();rows=rows.filter(r=>r.id.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q));}
  if(currentFilter!=="all")rows=rows.filter(r=>r.status===currentFilter);
  if(artistFilter!=="all"){if(artistFilter==="unassigned")rows=rows.filter(r=>!r.assignee);else rows=rows.filter(r=>r.assignee===artistFilter);}
  if(sortCol>=0){const keys=["idx","id","desc","cat","tcIn","tcOut","assignee","status"];const k=keys[sortCol];rows.sort((a,b)=>{let va=a[k],vb=b[k];if(typeof va==="string")va=va.toLowerCase();if(typeof vb==="string")vb=vb.toLowerCase();return va<vb?(sortAsc?-1:1):va>vb?(sortAsc?1:-1):0;});}
  if(_prioSort){rows.sort((a,b)=>{const pa=_prioOrder[getPriority(a.id)]??3,pb=_prioOrder[getPriority(b.id)]??3;return pa-pb;});}

  // Build row data for comparison
  const newIds=rows.map(r=>r.id).join(",");
  const oldIds=tbody.dataset.ids||"";
  const needFullRebuild=(newIds!==oldIds)||!tbody.children.length;

  if(needFullRebuild){
    tbody.innerHTML=rows.map(r=>_buildRow(r)).join("");
    tbody.dataset.ids=newIds;
  } else {
    // Patch only changed cells, leave gif thumbs untouched
    rows.forEach((r,i)=>{
      const tr=tbody.children[i];if(!tr)return;
      const cells=tr.children;
      const st=r.status,stClass="s-"+st,editSt=canEditStatus(r.id),adm=canAssign();
      const assignCls=r.assignee?" assign-"+r.assignee:"";
      const an=getAdminNote(r.id);
      const cp=chatPreview(r.id);const cpPrev=trunc(cp.text,20);
      const artistOpts=_getArtists().map(a=>`<option value="${a.id}" ${r.assignee===a.id?"selected":""}>${a.display}</option>`).join("");
      // [0]=prio [1]=# [2]=ID [3]=gif(skip) [4]=shotInfo [5]=cat [6]=tcIn [7]=tcOut [8]=artist [9]=status [10]=admin [11]=chat
      const prio=getPriority(r.id);const prioTagClass=prio?'prio-tag prio-'+prio:'prio-tag';
      if(cells[0]){const box=cells[0].querySelector('.prio-tag');if(box)box.className=prioTagClass;}
      tr.className=prio?'row-prio-'+prio:'';
      if(cells[4]&&!cells[4].querySelector('.si-edit'))cells[4].innerHTML=_renderShotInfo(r.id);
      if(cells[5]){const rc=getCat(r.id);cells[5].innerHTML=isAdmin()?_catTag(r.id,rc):_catTagHtml(rc);}
      if(cells[8]){const sel=cells[8].querySelector('select');if(sel&&sel.value!==r.assignee)sel.value=r.assignee||"";}
      if(cells[9]){const sel=cells[9].querySelector('select');if(sel&&sel.value!==st){sel.value=st;sel.className="status-select s-"+st;}}
      if(cells[10]&&!cells[10].querySelector('.desc-edit-ta'))cells[10].innerHTML=an||'<span style="color:#484f58">...</span>';
      if(cells[11])cells[11].innerHTML=`<div class="note-cell type-artist${cp.text?' has-text':''}" onclick="openNote('${r.id}','chat')">${cpPrev||'...'} ${cp.count?'<span class="msg-count" style="font-size:10px;color:#58a6ff">('+cp.count+')</span>':''}</div>`;
    });
  }
  updateStats();
}

function _buildRow(r){
  const st=r.status,stClass="s-"+st,editSt=canEditStatus(r.id),adm=canAssign();
  const assignCls=r.assignee?" assign-"+r.assignee:"";
  const an=getAdminNote(r.id);
  const cp=chatPreview(r.id);const cpPrev=trunc(cp.text,20);
  const artistOpts=_getArtists().map(a=>`<option value="${a.id}" ${r.assignee===a.id?"selected":""}>${a.display}</option>`).join("");
  const prio=getPriority(r.id);
  const prioTagClass=prio?'prio-tag prio-'+prio:'prio-tag';
  const rowPrioClass=prio?'row-prio-'+prio:'';
  const prioClick=canEditPrio()?`onclick="event.stopPropagation();openPrioDropdown('${r.id}',this)"`:'';
  const prioStyle=canEditPrio()?'':'style="cursor:default"';
  return `<tr class="${rowPrioClass}">
    <td><div class="${prioTagClass}" ${prioClick} ${prioStyle}></div></td>
    <td style="color:#484f58">${r.idx}</td>
    <td class="id-cell" onclick="openShot('${r.id}')">${r.id}</td>
    <td class="gif-cell">${hasGif(r.id)?`<div class="gif-thumb-wrap" onclick="openGif('${r.id}')"><img class="gif-thumb" src="${CDN_BASE}/thumbs/${r.id}.jpg" loading="lazy"><div class="gif-play-icon"></div></div>`:'<div class="gif-none">—</div>'}</td>
    <td class="shot-info-cell${isAdmin()?' editable':''}" ${isAdmin()?`onclick="startEditShotInfo('${r.id}',this,event)"`:''} data-tid="${r.id}">${_renderShotInfo(r.id)}</td>
    <td class="category-cell">${isAdmin()?_catTag(r.id,getCat(r.id)):_catTagHtml(getCat(r.id))}</td>
    <td class="tc-cell">${r.tcIn}</td>
    <td class="tc-cell">${r.tcOut}</td>
    <td><select class="assign-select" ${r.assignee?`style="border-color:${getUserColor(r.assignee)};color:${getUserColor(r.assignee)}"`:''}  onchange="setAssignee('${r.id}',this.value)" ${adm?"":"disabled"}><option value="" ${!r.assignee?"selected":""}>—</option>${artistOpts}</select></td>
    <td><select class="status-select ${stClass}" onchange="setStatus('${r.id}',this.value,this)" ${editSt?"":"disabled"}>
      <option value="todo" ${st==="todo"?"selected":""}>TODO</option><option value="progress" ${st==="progress"?"selected":""}>In Progress</option>
      <option value="review" ${st==="review"?"selected":""}>Review</option><option value="done" ${st==="done"?"selected":""}>Done</option>
      <option value="skip" ${st==="skip"?"selected":""}>Skip</option></select></td>
    <td class="desc-cell admin-col${canEditAdminNote()?' editable':''}" ${canEditAdminNote()?`onclick="startEditAdmin('${r.id}',this,event)"`:''} data-tid="${r.id}">${an||'<span style="color:#484f58">...</span>'}</td>
    <td><div class="note-cell type-artist${cp.text?' has-text':''}" onclick="openNote('${r.id}','chat')">${cpPrev||'...'} ${cp.count?'<span class="msg-count" style="font-size:10px;color:#58a6ff">('+cp.count+')</span>':''}</div></td>
  </tr>`;
}

function startEditDesc(tid,td,ev){
  if(!canEditDesc())return;
  if(td.querySelector('.desc-edit-ta'))return; // already editing
  ev.stopPropagation();
  const current=getDesc(tid,TASKS.find(t=>t.id===tid)?.desc||'');
  td.innerHTML=`<textarea class="desc-edit-ta" rows="1">${esc(current)}</textarea>`;
  const ta=td.querySelector('textarea');
  if(ta){
    // Auto-size to content
    ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    ta.addEventListener('blur',()=>saveDesc(tid,ta));
    ta.addEventListener('keydown',e=>{
      if(e.key==='Escape'){ta.dataset.cancel='1';ta.blur();}
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}
    });
  }
}
function saveDesc(tid,ta){
  const td=ta.parentElement;
  if(ta.dataset.cancel==='1'){if(td)td.innerHTML=getDesc(tid,TASKS.find(t=>t.id===tid)?.desc||'');render();return;}
  const val=ta.value.trim();
  if(!val){if(td)td.innerHTML=getDesc(tid,TASKS.find(t=>t.id===tid)?.desc||'');render();return;}
  if(!state[tid])state[tid]={};
  state[tid].desc=val;
  if(td)td.innerHTML=val;
  saveState(state);
  render();
}

function startEditAdmin(tid,td,ev){
  if(!canEditAdminNote())return;
  if(td.querySelector('.desc-edit-ta'))return;
  ev.stopPropagation();
  const current=getAdminNote(tid);
  td.innerHTML=`<textarea class="desc-edit-ta" rows="1">${esc(current)}</textarea>`;
  const ta=td.querySelector('textarea');
  if(ta){
    ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    ta.addEventListener('blur',()=>saveAdmin(tid,ta));
    ta.addEventListener('keydown',e=>{
      if(e.key==='Escape'){ta.dataset.cancel='1';ta.blur();}
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}
    });
  }
}
function saveAdmin(tid,ta){
  const td=ta.parentElement;
  if(ta.dataset.cancel==='1'){if(td)td.innerHTML=getAdminNote(tid)||'<span style="color:#484f58">...</span>';render();return;}
  if(!state[tid])state[tid]={};
  state[tid].adminNote=ta.value.trim();
  if(td)td.innerHTML=state[tid].adminNote||'<span style="color:#484f58">...</span>';
  saveState(state);
  render();
}

function setStatus(id,val,el){if(!canEditStatus(id))return;if(!state[id])state[id]={};state[id].status=val;saveState(state);el.className="status-select s-"+val;updateStats();}
function setAssignee(id,val){if(!canAssign())return;if(!state[id])state[id]={};state[id].assignee=val;saveState(state);render();}
function sortTable(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}_updateSortArrows();render();}
const _arrowCols=new Set([1,4,5]); // ID, TC In, TC Out
function _updateSortArrows(){
  document.querySelectorAll('thead th[data-col]').forEach(th=>{
    const c=parseInt(th.dataset.col);
    const base=th.dataset.label||'';
    th.innerHTML=(c===sortCol&&_arrowCols.has(c))?base+' '+(sortAsc?'▼':'▲'):base;
  });
}
document.getElementById("search").addEventListener("input",e=>{searchQuery=e.target.value;render();});
document.querySelectorAll(".filter-btn").forEach(b=>{b.addEventListener("click",()=>{document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");currentFilter=b.dataset.filter;render();});});
document.querySelectorAll(".artist-filter-btn").forEach(b=>{b.addEventListener("click",()=>{document.querySelectorAll(".artist-filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");artistFilter=b.dataset.artist;render();});});

function exportCSV(){
  let csv="ID,Description,Category,TC In,TC Out,Artist,Status,Admin Notes,Chat\n";
  TASKS.forEach(t=>{const st=getStatus(t.id),ar=getAssignee(t.id);const an=getAdminNote(t.id).replace(/"/g,'""');const ch=getChat(t.id).filter(m=>!m.deleted).map(m=>`[${m.author}] ${m.text}`).join("\n").replace(/"/g,'""');csv+=`"${t.id}","${t.desc}","${CAT_LABELS[getCat(t.id)]||getCat(t.id)}","${t.tcIn}","${t.tcOut}","${ar}","${st}","${an}","${ch}"\n`;});
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="kh_vfx_tracker.csv";a.click();
}
render();

// Fallback poll every 15s in case WebSocket drops
setInterval(async()=>{
  if(_saving)return;
  const pulled=await _pullRemote();
  if(pulled){runMigrations();render();
    if(_gifCurrentId)renderPlayerNotes();
    if(noteTaskId&&noteType==='chat')renderChat();
  }
},15000);
</script>
