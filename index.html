async function _moveFile(id,fileName,targetFolder){
  const srcKey=_getCurrentStateKey();
  if(!srcKey)return;
  // Determine target state key
  let destKey;
  if(targetFolder==='..'){
    // Move to parent
    if(_filesPath.length<=1) destKey='_root';
    else destKey=_filesPath.slice(0,-1).join('/');
  } else if(_filesPath.length===0){
    destKey=targetFolder;
  } else {
    destKey=_filesPath.concat(targetFolder).join('/');
  }
  if(srcKey===destKey)return;
  // Find file in source
  const filesDict=_getFilesDict(id);
  const srcFiles=filesDict[srcKey]||[];
  const idx=srcFiles.findIndex(f=>f.name===fileName);
  if(idx<0)return;
  const fileEntry={...srcFiles[idx]};
  // Check duplicate in target
  if(!filesDict[destKey])filesDict[destKey]=[];
  if(filesDict[destKey].some(f=>f.name===fileName)){
    await _showAlert('Duplicate','<b>'+esc(fileName)+'</b> already exists in <b>'+esc(targetFolder)+'</b>');
    return;
  }
  // Move: remove from source, add to target
  srcFiles.splice(idx,1);
  filesDict[destKey].push(fileEntry);
  if(id!=='__admin')_addFileHistory(id,'moved',fileName,srcKey+' → '+destKey);
  saveState(state);
  _renderShotFiles(id);
}

async function _moveFolder(id,folderName,targetFolder){
  if(folderName===targetFolder)return;
  const foldersArr=_getFoldersArray(id);
  const filesDict=_getFilesDict(id);
  if(!foldersArr.length)return;
  // Current full path of the folder
  const currentPath=_filesPath.length===0?folderName:_filesPath.join('/')+'/'+folderName;
  const idx=foldersArr.findIndex(f=>f.name===currentPath);
  if(idx<0)return;

  let newPath;
  if(targetFolder==='..'){
    // Move up one level
    const parts=currentPath.split('/');
    if(parts.length<=1)return;// already at root
    parts.splice(-2,1);// remove parent from path
    newPath=parts.join('/');
  } else {
    // Move into target folder
    const targetPath=_filesPath.length===0?targetFolder:_filesPath.join('/')+'/'+targetFolder;
    newPath=targetPath+'/'+folderName;
  }
  // Check no duplicate at destination
  if(foldersArr.some(f=>f.name===newPath))return;
  // Rename folder path
  foldersArr[idx].name=newPath;
  // Rename files key
  if(filesDict[currentPath]){
    filesDict[newPath]=filesDict[currentPath];
    delete filesDict[currentPath];
  }
  // Also rename any nested subfolders
  foldersArr.forEach(f=>{
    if(f.name.startsWith(currentPath+'/')){
      const oldKey=f.name;
      f.name=newPath+f.name.substring(currentPath.length);
      if(filesDict[oldKey]){
        filesDict[f.name]=filesDict[oldKey];
        delete filesDict[oldKey];
      }
    }
  });
  if(id!=='__admin')_addFileHistory(id,'moved',folderName,currentPath+' → '+newPath);
  saveState(state);
  _renderShotFiles(id);
}
function _collectFileUrls(items){
  let urls=[];
  for(const f of items){
    if(f.type==='folder'&&f.children) urls=urls.concat(_collectFileUrls(f.children));
    else if(f.url) urls.push({name:f.name,url:f.url});
  }
  return urls;
}
function _collectFileUrlsWithPath(items,prefix){
  let out=[];
  for(const f of items){
    if(f.type==='folder'&&f.children) out=out.concat(_collectFileUrlsWithPath(f.children,prefix+f.name+'/'));
    else if(f.url) out.push({name:f.name,path:prefix+f.name,url:f.url});
  }
  return out;
}
async function _downloadAsZip(files,zipName){
  if(!files.length){await _showAlert('Empty','No files to download');return;}
  const {makeZip}=await import("https://cdn.jsdelivr.net/npm/client-zip/index.js");
  let done=0;
  const panel=_showOperationProgress('Downloading & zipping',files.length);
  const WORKER='https://killhouse-vfx.contora.workers.dev/r2/';
  async function* generateFiles(){
    for(const f of files){
      const proxyUrl=f.url.startsWith(CDN_BASE)?WORKER+f.url.substring(CDN_BASE.length+1):f.url;
      try{
        const resp=await fetch(proxyUrl);
        if(!resp.ok)throw new Error('fetch failed');
        done++;
        _updateOperationProgress(panel,done,files.length,f.name||f.path);
        yield{name:f.path,input:resp};
      }catch(e){
        done++;
        _updateOperationProgress(panel,done,files.length,f.name||f.path);
      }
    }
  }
  try{
    const zipStream=makeZip(generateFiles());
    const fileStream=streamSaver.createWriteStream(zipName+'.zip');
    await zipStream.pipeTo(fileStream);
  }catch(e){
    console.error('ZIP stream error:',e);
    await _showAlert('Error','Failed to create ZIP: '+e.message);
  }
  _removeOperationProgress(panel);
}

async function r2Delete(key){
  const now=new Date();
  const amzDate=now.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const dateStamp=amzDate.substring(0,8);
  const region="auto",service="s3";
  const host=new URL(R2_ENDPOINT).host;
  const encodedPath="/"+R2_BUCKET+"/"+key.split("/").map(s=>encodeURIComponent(s)).join("/");
  const headers={"host":host,"x-amz-content-sha256":"UNSIGNED-PAYLOAD","x-amz-date":amzDate};
  const signedHeaders=Object.keys(headers).sort().join(";");
  const canonicalHeaders=Object.keys(headers).sort().map(k=>k+":"+headers[k]).join("\n")+"\n";
  const canonicalRequest=["DELETE",encodedPath,"",canonicalHeaders,signedHeaders,"UNSIGNED-PAYLOAD"].join("\n");
  const scope=dateStamp+"/"+region+"/"+service+"/aws4_request";
  const stringToSign=["AWS4-HMAC-SHA256",amzDate,scope,await _sha256hex(canonicalRequest)].join("\n");
  const signingKey=await _getSigningKey(R2_SECRET_KEY,dateStamp,region,service);
  const sig=[...await _hmac(signingKey,stringToSign)].map(b=>b.toString(16).padStart(2,"0")).join("");
  const auth="AWS4-HMAC-SHA256 Credential="+R2_ACCESS_KEY+"/"+scope+", SignedHeaders="+signedHeaders+", Signature="+sig;
  return fetch(R2_ENDPOINT+encodedPath,{method:"DELETE",headers:{...headers,"Authorization":auth}});
}

const R2_ACCESS_KEY="d9fd350d6e623ab85ccb0a58930a35d8";
const R2_SECRET_KEY="4498ba8839c82bd88fd4a9d3e4d9edb44268ff73a646d818314d6df8be6eb1f8";
const R2_ENDPOINT="https://6b4341dd25b4f283d53ad86424e39e74.r2.cloudflarestorage.com";
const R2_BUCKET="kh-vfx-video";

async function _hmac(key,msg){
  const k=typeof key==="string"?new TextEncoder().encode(key):key;
  const cryptoKey=await crypto.subtle.importKey("raw",k,{name:"HMAC",hash:"SHA-256"},false,["sign"]);
  return new Uint8Array(await crypto.subtle.sign("HMAC",cryptoKey,new TextEncoder().encode(msg)));
}
async function _sha256hex(str){
  const hash=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return[...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function _getSigningKey(secret,date,region,service){
  let k=await _hmac("AWS4"+secret,date);
  k=await _hmac(k,region);k=await _hmac(k,service);k=await _hmac(k,"aws4_request");return k;
}
const _uploads={};// shotId → {name,pct,done,error}

async function _signR2(key,contentType){
  const now=new Date();
  const amzDate=now.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const dateStamp=amzDate.substring(0,8);
  const region="auto",service="s3";
  const host=new URL(R2_ENDPOINT).host;
  const rawPath="/"+R2_BUCKET+"/"+key;
  const encodedPath="/"+R2_BUCKET+"/"+key.split("/").map(s=>encodeURIComponent(s)).join("/");
  const headers={"host":host,"x-amz-content-sha256":"UNSIGNED-PAYLOAD","x-amz-date":amzDate,"content-type":contentType};
  const signedHeaders=Object.keys(headers).sort().join(";");
  const canonicalHeaders=Object.keys(headers).sort().map(k=>k+":"+headers[k]).join("\n")+"\n";
  const canonicalRequest=["PUT",encodedPath,"",canonicalHeaders,signedHeaders,"UNSIGNED-PAYLOAD"].join("\n");
  const scope=dateStamp+"/"+region+"/"+service+"/aws4_request";
  const stringToSign=["AWS4-HMAC-SHA256",amzDate,scope,await _sha256hex(canonicalRequest)].join("\n");
  const signingKey=await _getSigningKey(R2_SECRET_KEY,dateStamp,region,service);
  const sig=[...await _hmac(signingKey,stringToSign)].map(b=>b.toString(16).padStart(2,"0")).join("");
  const auth="AWS4-HMAC-SHA256 Credential="+R2_ACCESS_KEY+"/"+scope+", SignedHeaders="+signedHeaders+", Signature="+sig;
  return{url:R2_ENDPOINT+encodedPath,headers:{...headers,"Authorization":auth}};
}

function r2UploadXHR(key,file,onProgress){
  return new Promise(async(resolve)=>{
    const ct=file.type||"video/mp4";
    const signed=await _signR2(key,ct);
    const xhr=new XMLHttpRequest();
    xhr.open("PUT",signed.url);
    Object.entries(signed.headers).forEach(([k,v])=>xhr.setRequestHeader(k,v));
    xhr.upload.onprogress=(e)=>{if(e.lengthComputable&&onProgress)onProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=()=>resolve(xhr.status>=200&&xhr.status<300);
    xhr.onerror=()=>resolve(false);
    xhr.send(file);
  });
}

function r2UploadXHRAbortable(key,file,onProgress){
  let xhr;
  const promise=new Promise(async(resolve)=>{
    const ct=file.type||"application/octet-stream";
    const signed=await _signR2(key,ct);
    xhr=new XMLHttpRequest();
    xhr.open("PUT",signed.url);
    Object.entries(signed.headers).forEach(([k,v])=>xhr.setRequestHeader(k,v));
    xhr.upload.onprogress=(e)=>{if(e.lengthComputable&&onProgress)onProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=()=>resolve(xhr.status>=200&&xhr.status<300);
    xhr.onerror=()=>resolve(false);
    xhr.onabort=()=>resolve(false);
    xhr.send(file);
  });
  return {promise,abort:()=>xhr&&xhr.abort()};
}

// === Version Naming System ===
// Format: {shotId}_{task}_v001.{ext}  (industry standard _v### padding)
// File MUST start with shotId prefix, version gaps allowed (v001→v022 OK)
// but going backwards forbidden (after v022, can't upload v015)

function _parseVersionName(filename){
  const ext=filename.split('.').pop()||'mp4';
  const noExt=filename.replace(/\.[^.]+$/,'');
  const match=noExt.match(/^(.+?)_prev_v(\d{3,4})$/i)||noExt.match(/^(.+?)_v(\d{3,4})$/i);
  return {baseName:match?match[1]:noExt, vNum:match?parseInt(match[2],10):0, ext};
}
function _getMaxVersion(shotId,baseName){
  const versions=state[shotId]?.versions||[];
  let max=0;
  for(const v of versions){
    const p=_parseVersionName(v.name||'');
    if(p.baseName.toLowerCase()===baseName.toLowerCase()){
      const m=(v.name||'').match(/_v(\d{3,4})/i);
      if(m) max=Math.max(max,parseInt(m[1],10));
    }
  }
  return max;
}
function _formatVersion(num){return '_v'+String(num).padStart(3,'0');}

function _highlightError(filename,errorParts){
  // errorParts: array of {text,error:bool}
  return errorParts.map(p=>p.error?`<span style="color:#f85149;background:rgba(248,81,73,0.15);padding:0 2px;border-radius:2px">${esc(p.text)}</span>`:`<span style="color:#8b949e">${esc(p.text)}</span>`).join('');
}
function _validateVersionFile(shotId,filename){
  const {baseName,vNum,ext}=_parseVersionName(filename);
  const errors=[];
  const warnings=[];
  const nextV=_getMaxVersion(shotId,shotId)+1;
  const correctName=shotId+'_prev'+_formatVersion(nextV)+'.'+ext;

  // 1. baseName must be shotId or shotId_prev
  const bnLower=baseName.toLowerCase();
  const idLower=shotId.toLowerCase();
  if(bnLower!==idLower&&bnLower!==idLower+'_prev'){
    const current=_highlightError(filename,[
      {text:baseName,error:true},
      {text:vNum?_formatVersion(vNum):''},{text:'.'+ext}
    ]);
    errors.push({type:'wrong_name',suggest:correctName,current});
    return {ok:false,errors,warnings,baseName,vNum,ext};
  }

  // 2. Check _v### suffix present
  if(vNum===0){
    const current=_highlightError(filename,[
      {text:baseName},
      {text:'_v???',error:true},
      {text:'.'+ext}
    ]);
    errors.push({type:'no_version',suggest:correctName,current,detail:'Missing <b>_v###</b> suffix'});
    return {ok:false,errors,warnings,baseName,vNum,ext};
  }

  // 3. Check version not going backwards
  const maxV=_getMaxVersion(shotId,shotId);
  if(vNum<=maxV){
    const current=_highlightError(filename,[
      {text:baseName},
      {text:_formatVersion(vNum),error:true},
      {text:'.'+ext}
    ]);
    errors.push({type:'version_backwards',suggest:shotId+'_prev'+_formatVersion(maxV+1)+'.'+ext,current,detail:`Latest is <b>_v${String(maxV).padStart(3,'0')}</b>, next must be <b>_v${String(maxV+1).padStart(3,'0')}</b>+`});
    return {ok:false,errors,warnings,baseName,vNum,ext};
  }

  // 4. Warn on large gap
  if(maxV>0&&vNum>maxV+10){
    warnings.push(`Large version gap: _v${String(maxV).padStart(3,'0')} → _v${String(vNum).padStart(3,'0')}`);
  }

  return {ok:true,errors,warnings,baseName,vNum,ext,versionName:shotId+'_prev'+_formatVersion(vNum)+'.'+ext};
}

async function uploadVersion(shotId,input){
  const file=input.files[0];
  if(!file)return;
  input.value="";

  const result=await _validateAndPrepareVersion(shotId,file);
  if(!result.ok)return;

  const ts=Date.now();
  const key="versions/"+shotId+"/"+result.versionName;
  _uploads[shotId]={name:result.versionName,pct:0,done:false,error:false,stage:'uploading'};
  if(_shotCurrentId===shotId)_renderShotBody(shotId);
  const ok=await r2UploadXHR(key,result.file,(pct)=>{
    _uploads[shotId].pct=pct;
    _uploads[shotId].stage='uploading';
    _updateUploadUI(shotId);
  });
  if(ok){
    if(!state[shotId])state[shotId]={};
    if(!state[shotId].versions)state[shotId].versions=[];
    const thumbKey="versions/"+shotId+"/thumb_"+result.baseName+_formatVersion(result.vNum)+".jpg";
    const thumbUrl=await _generateThumbnail(CDN_BASE+"/"+key,thumbKey);
    state[shotId].versions.push({name:result.versionName,baseName:result.baseName,url:CDN_BASE+"/"+key,thumb:thumbUrl||null,ts});
    saveState(state);
    _uploads[shotId].done=true;
  } else {
    _uploads[shotId].error=true;
  }
  delete _uploads[shotId];
  if(_shotCurrentId===shotId)_renderShotBody(shotId);
}

// === ffmpeg.wasm transcoder ===
let _ffmpegInstance=null;
async function _toBlobURL(url,type){
  const resp=await fetch(url);
  const buf=await resp.arrayBuffer();
  const blob=new Blob([buf],{type});
  return URL.createObjectURL(blob);
}
async function _getFFmpeg(){
  if(_ffmpegInstance)return _ffmpegInstance;
  const ffmpeg=new FFmpegWASM.FFmpeg();
  ffmpeg.on('log',({message})=>console.log('[ffmpeg]',message));
  const localBase=new URL('ffmpeg',location.href).href;
  const coreURL=await _toBlobURL(localBase+'/ffmpeg-core.js','text/javascript');
  const wasmURL=await _toBlobURL(CDN_BASE+'/static/ffmpeg-core.wasm','application/wasm');
  const workerURL=await _toBlobURL(localBase+'/814.ffmpeg.js','text/javascript');
  await ffmpeg.load({coreURL,wasmURL,workerURL});
  _ffmpegInstance=ffmpeg;
  return ffmpeg;
}
async function _transcodeToMp4(file,onProgress){
  const ffmpeg=await _getFFmpeg();
  const inputName='input.'+file.name.split('.').pop();
  const outputName='output.mp4';
  const data=new Uint8Array(await file.arrayBuffer());
  await ffmpeg.writeFile(inputName,data);
  ffmpeg.on('progress',({progress})=>{
    if(onProgress)onProgress(Math.round(progress*100));
  });
  await ffmpeg.exec(['-i',inputName,'-c:v','libx264','-preset','fast','-crf','23','-c:a','aac','-movflags','+faststart','-y',outputName]);
  const result=await ffmpeg.readFile(outputName);
  await ffmpeg.deleteFile(inputName);
  await ffmpeg.deleteFile(outputName);
  return new File([result],file.name.replace(/\.[^.]+$/,'.mp4'),{type:'video/mp4'});
}

async function _generateThumbnail(videoUrl,thumbKey){
  return new Promise((resolve)=>{
    const vid=document.createElement("video");
    vid.crossOrigin="anonymous";
    vid.muted=true;vid.preload="auto";
    vid.addEventListener("loadeddata",()=>{
      vid.currentTime=0.1;
    });
    vid.addEventListener("seeked",()=>{
      try{
        const cv=document.createElement("canvas");
        cv.width=vid.videoWidth;cv.height=vid.videoHeight;
        cv.getContext("2d").drawImage(vid,0,0);
        cv.toBlob(async(blob)=>{
          if(!blob){resolve(null);return;}
          const ok=await r2UploadXHR(thumbKey,blob);
          vid.remove();
          resolve(ok?CDN_BASE+"/"+thumbKey:null);
        },"image/jpeg",0.8);
      }catch(e){vid.remove();resolve(null);}
    },{once:true});
    vid.addEventListener("error",()=>{vid.remove();resolve(null);});
    vid.src=videoUrl;
    setTimeout(()=>{vid.remove();resolve(null);},15000);
  });
}

    <td><select class="status-select ${stClass}" onchange="setStatus('${r.id}',this.value,this)" ${editSt?"":"disabled"}>
      <option value="todo" ${st==="todo"?"selected":""}>TODO</option><option value="progress" ${st==="progress"?"selected":""}>In Progress</option>
      <option value="review" ${st==="review"?"selected":""}>Review</option><option value="done" ${st==="done"?"selected":""}>Done</option>
      <option value="skip" ${st==="skip"?"selected":""}>Skip</option></select></td>
    <td class="desc-cell admin-col${canEditAdminNote()&&isEditMode()?' editable':''}" ${canEditAdminNote()&&isEditMode()?`onclick="startEditAdmin('${r.id}',this,event)"`:''} data-tid="${r.id}">${an||'<span style="color:#484f58">...</span>'}</td>
    <td style="vertical-align:top;padding-top:32px"><div class="note-cell${cp.text?' has-text':''}${hasUnread(r.id)?' unread':' read'}" onclick="openNote('${r.id}','chat')"><div class="chat-preview-fade">${cp.lines.length?cp.lines.map(l=>`<div class="cp-bubble cp-${l.role}">${esc(l.text)}</div>`).join(''):'<span style="color:#484f58;font-size:11px">...</span>'}</div></div></td>
    ${isAdmin()&&isEditMode()?`<td style="text-align:center"><button style="background:#da3633;color:#fff;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px" onclick="event.stopPropagation();deleteShot('${r.id}')">✕</button></td>`:''}
  </tr>`;
}

function startEditDesc(tid,td,ev){
  if(!canEditDesc())return;
  if(td.querySelector('.desc-edit-ta'))return; // already editing
  ev.stopPropagation();
  const current=getDesc(tid,TASKS.find(t=>t.id===tid)?.desc||'');
  td.innerHTML=`<textarea class="desc-edit-ta" rows="1">${esc(current)}</textarea>`;
  const ta=td.querySelector('textarea');
  if(ta){
    // Auto-size to content
    ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    ta.addEventListener('blur',()=>saveDesc(tid,ta));
    ta.addEventListener('keydown',e=>{
      if(e.key==='Escape'){ta.dataset.cancel='1';ta.blur();}
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}
    });
  }
}
function saveDesc(tid,ta){
  const td=ta.parentElement;
  if(ta.dataset.cancel==='1'){if(td)td.innerHTML=getDesc(tid,TASKS.find(t=>t.id===tid)?.desc||'');render();return;}
  const val=ta.value.trim();
  if(!val){if(td)td.innerHTML=getDesc(tid,TASKS.find(t=>t.id===tid)?.desc||'');render();return;}
  if(!state[tid])state[tid]={};
  state[tid].desc=val;
  if(td)td.innerHTML=val;
  saveState(state);
  render();
}

function startEditAdmin(tid,td,ev){
  if(!isEditMode()||!canEditAdminNote())return;
  if(td.querySelector('.desc-edit-ta'))return;
  ev.stopPropagation();
  const current=getAdminNote(tid);
  td.innerHTML=`<textarea class="desc-edit-ta" rows="1">${esc(current)}</textarea>`;
  const ta=td.querySelector('textarea');
  if(ta){
    ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    ta.addEventListener('blur',()=>saveAdmin(tid,ta));
    ta.addEventListener('keydown',e=>{
      if(e.key==='Escape'){ta.dataset.cancel='1';ta.blur();}
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}
    });
  }
}
function saveAdmin(tid,ta){
  const td=ta.parentElement;
  if(ta.dataset.cancel==='1'){if(td)td.innerHTML=getAdminNote(tid)||'<span style="color:#484f58">...</span>';render();return;}
  if(!state[tid])state[tid]={};
  state[tid].adminNote=ta.value.trim();
  if(td)td.innerHTML=state[tid].adminNote||'<span style="color:#484f58">...</span>';
  saveState(state);
  render();
}

function setStatus(id,val,el){if(!canEditStatus(id))return;if(!state[id])state[id]={};state[id].status=val;saveState(state);el.className="status-select s-"+val;updateStats();}
function setAssignee(id,val){if(!isEditMode()||!canAssign())return;if(!state[id])state[id]={};state[id].assignee=val;saveState(state);render();}
function sortTable(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}_updateSortArrows();render();}
const _arrowCols=new Set([1,4,5]); // ID, TC In, TC Out
function _updateSortArrows(){
  document.querySelectorAll('thead th[data-col]').forEach(th=>{
    const c=parseInt(th.dataset.col);
    const base=th.dataset.label||'';
    th.innerHTML=(c===sortCol&&_arrowCols.has(c))?base+' '+(sortAsc?'▼':'▲'):base;
  });
}
document.getElementById("search").addEventListener("input",e=>{searchQuery=e.target.value;render();});
document.querySelectorAll(".filter-btn").forEach(b=>{b.addEventListener("click",()=>{document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");currentFilter=b.dataset.filter;render();});});
document.querySelectorAll(".artist-filter-btn").forEach(b=>{b.addEventListener("click",()=>{document.querySelectorAll(".artist-filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");artistFilter=b.dataset.artist;render();});});

render();

// Fallback poll every 15s in case WebSocket drops
setInterval(async()=>{
  if(_saving)return;
  const pulled=await _pullRemote();
  if(pulled){runMigrations();render();
    if(_gifCurrentId)renderPlayerNotes();
    if(noteTaskId&&noteType==='chat')renderChat();
  }
},15000);
</script>
</body>
