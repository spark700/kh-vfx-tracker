<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KILLHOUSE VFX Tracker — Declined Tasks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9; padding: 20px;
  }
  h1 { color: #f0f6fc; margin-bottom: 6px; font-size: 22px; }
  .subtitle { color: #8b949e; margin-bottom: 20px; font-size: 14px; }
  .header-row { display: flex; align-items: center; gap: 16px; margin-bottom: 6px; }
  .user-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #161b22; border: 1px solid #30363d;
    border-radius: 20px; padding: 4px 14px 4px 10px; font-size: 13px;
  }
  .user-badge .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-admin { background: #f85149; } .dot-nikita { background: #58a6ff; }
  .dot-igor { background: #3fb950; } .dot-guest { background: #484f58; } .dot-client { background: #d29922; }
  .user-badge .uname { font-weight: 600; }
  .logout-link { color: #484f58; font-size: 12px; cursor: pointer; text-decoration: underline; margin-left: 4px; }
  .logout-link:hover { color: #8b949e; }
  .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .login-overlay.hidden { display: none; }
  .login-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px; width: 340px; text-align: center; }
  .login-box h2 { color: #f0f6fc; margin-bottom: 8px; font-size: 20px; }
  .login-box p { color: #8b949e; font-size: 13px; margin-bottom: 20px; }
  .login-box input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 10px 14px; border-radius: 8px; font-size: 15px; width: 100%; text-align: center; letter-spacing: 2px; margin-bottom: 14px; }
  .login-box input:focus { outline: none; border-color: #1f6feb; }
  .login-box .login-btn { background: #1f6feb; border: none; color: #fff; padding: 10px 0; border-radius: 8px; font-size: 14px; font-weight: 600; width: 100%; cursor: pointer; margin-bottom: 10px; }
  .login-box .login-btn:hover { background: #388bfd; }
  .login-box .guest-btn { background: transparent; border: 1px solid #30363d; color: #8b949e; padding: 10px 0; border-radius: 8px; font-size: 13px; width: 100%; cursor: pointer; margin-bottom: 10px; }
  .login-box .guest-btn:hover { background: #161b22; color: #c9d1d9; border-color: #484f58; }
  .login-divider { color: #484f58; font-size: 12px; margin: 6px 0 14px; }
  .login-error { color: #f85149; font-size: 13px; min-height: 20px; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 20px; min-width: 140px; }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: #8b949e; margin-top: 2px; }
  .num.red { color: #f85149; } .num.yellow { color: #d29922; } .num.green { color: #3fb950; } .num.blue { color: #58a6ff; }
  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filters input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 260px; }
  .filters input::placeholder { color: #484f58; }
  .filter-btn, .artist-filter-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.15s; }
  .filter-btn:hover, .artist-filter-btn:hover { background: #30363d; }
  .filter-btn.active, .artist-filter-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .separator { color: #30363d; font-size: 18px; user-select: none; }
  table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; }
  thead th { background: #21262d; padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #30363d; cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: #c9d1d9; }
  tbody tr { border-bottom: 1px solid #21262d; transition: 0.1s; }
  tbody tr:hover { background: #1c2128; }
  tbody td { padding: 10px 14px; font-size: 14px; vertical-align: top; }
  td.id-cell { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; color: #58a6ff; white-space: nowrap; }
  td.tc-cell { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #8b949e; white-space: nowrap; }
  td.desc-cell { max-width: 400px; word-break: break-word; white-space: normal; }
  td.gif-cell { width: 80px; padding: 6px; }
  .gif-thumb { width: 70px; height: 44px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid #30363d; transition: 0.15s; display: block; background: #0d1117; }
  .gif-thumb:hover { border-color: #58a6ff; transform: scale(1.05); }
  .gif-thumb-wrap { position: relative; width: 70px; height: 44px; }
  .gif-play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .gif-play-icon::after { content: "▶"; font-size: 16px; color: rgba(255,255,255,0.7); text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
  .gif-none { width: 70px; height: 44px; border-radius: 4px; background: #161b22; border: 1px solid #21262d; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #484f58; }
  .gif-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .gif-overlay.hidden { display: none; }
  .gif-overlay img { max-width: 90vw; max-height: 80vh; border-radius: 8px; cursor: pointer; }
  .gif-controls { margin-top: 16px; display: flex; gap: 12px; align-items: center; }
  .gif-ctrl-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.15s; }
  .gif-ctrl-btn:hover { background: rgba(255,255,255,0.2); }
  .gif-close-btn { position: absolute; top: 20px; right: 24px; background: none; border: none; color: #8b949e; font-size: 32px; cursor: pointer; line-height: 1; }
  .gif-close-btn:hover { color: #fff; }
  td.desc-cell.editable { cursor: pointer; border-radius: 4px; transition: 0.15s; padding: 8px 12px; }
  td.desc-cell.editable:hover { background: #1c2128; outline: 1px solid #30363d; }
  .desc-edit-ta { background: transparent; border: none; color: #c9d1d9; padding: 0; font-size: 14px; width: 100%; font-family: inherit; line-height: 1.5; resize: none; overflow: hidden; outline: 1px solid #1f6feb; outline-offset: 4px; border-radius: 4px; }
  .desc-edit-ta:focus { outline: 1px solid #1f6feb; outline-offset: 4px; }
  td.category-cell { white-space: nowrap; }
  .cat-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .cat-voronka { background: #3d1f00; color: #d29922; } .cat-fpv { background: #1a0030; color: #bc8cff; }
  .cat-vrezka { background: #00261c; color: #3fb950; } .cat-angar { background: #30160a; color: #f0883e; }
  .cat-puli { background: #300018; color: #f778ba; } .cat-vzryv { background: #2a0000; color: #f85149; }
  .cat-dym { background: #1a1a2e; color: #8b949e; } .cat-other { background: #1c1c1c; color: #8b949e; }
  .status-select, .assign-select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 8px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .status-select:disabled, .assign-select:disabled { opacity: 0.4; cursor: not-allowed; }
  .status-select.s-todo { border-color: #f85149; color: #f85149; }
  .status-select.s-progress { border-color: #d29922; color: #d29922; }
  .status-select.s-review { border-color: #58a6ff; color: #58a6ff; }
  .status-select.s-done { border-color: #3fb950; color: #3fb950; }
  .status-select.s-skip { border-color: #484f58; color: #484f58; }
  .assign-nikita { border-color: #58a6ff; color: #58a6ff; }
  .assign-igor { border-color: #3fb950; color: #3fb950; }
  .note-cell { cursor: pointer; padding: 4px 10px; border-radius: 6px; font-size: 12px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: #0d1117; border: 1px solid #30363d; color: #484f58; display: block; text-align: left; transition: 0.15s; }
  .note-cell:hover { border-color: #484f58; color: #c9d1d9; }
  .note-cell.has-text { color: #c9d1d9; border-color: #484f58; }
  .note-cell.type-admin { border-left: 3px solid #f85149; }
  .note-cell.type-artist { border-left: 3px solid #58a6ff; }
  .note-cell .msg-count { font-size: 10px; color: #58a6ff; margin-left: 4px; }

  /* Fullscreen note overlay */
  .note-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: stretch; justify-content: center; padding: 40px; }
  .note-overlay.hidden { display: none; }
  .note-panel { background: #161b22; border: 1px solid #30363d; border-radius: 12px; width: 100%; max-width: 700px; display: flex; flex-direction: column; overflow: hidden; }
  .note-panel-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 16px; border-bottom: 1px solid #21262d; flex-shrink: 0; }
  .note-panel-title { display: flex; align-items: center; gap: 10px; }
  .note-panel-title h3 { color: #f0f6fc; font-size: 16px; font-weight: 600; }
  .note-type-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 2px 8px; border-radius: 4px; }
  .note-type-badge.admin-badge { background: #3d0000; color: #f85149; }
  .note-type-badge.artist-badge { background: #0a1929; color: #58a6ff; }
  .note-panel-close { background: none; border: none; color: #484f58; font-size: 24px; cursor: pointer; padding: 4px 8px; border-radius: 4px; line-height: 1; }
  .note-panel-close:hover { color: #c9d1d9; background: #21262d; }
  .note-panel-meta { padding: 12px 24px; font-size: 13px; color: #8b949e; border-bottom: 1px solid #21262d; flex-shrink: 0; }
  .note-panel-meta .shot-id { font-family: 'SF Mono', monospace; color: #58a6ff; font-weight: 600; }
  .note-panel-meta .shot-desc { margin-left: 8px; }
  .note-panel-body { flex: 1; padding: 20px 24px; overflow-y: auto; display: flex; flex-direction: column; }
  .note-panel-body textarea { flex: 1; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 16px; border-radius: 8px; font-size: 15px; line-height: 1.6; font-family: inherit; resize: none; min-height: 200px; }
  .note-panel-body textarea:focus { outline: none; border-color: #1f6feb; }
  .note-panel-body textarea::placeholder { color: #484f58; }
  .note-panel-readonly { flex: 1; background: #0d1117; border: 1px solid #21262d; color: #c9d1d9; padding: 16px; border-radius: 8px; font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; overflow-y: auto; min-height: 200px; }
  .note-panel-readonly.empty { color: #484f58; font-style: italic; }
  .note-panel-footer { padding: 16px 24px; border-top: 1px solid #21262d; display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; }
  .note-panel-footer.hidden { display: none; }
  .note-save-btn { background: #1f6feb; border: none; color: #fff; padding: 8px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .note-save-btn:hover { background: #388bfd; }
  .note-cancel-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; }
  .note-cancel-btn:hover { background: #30363d; }

  /* Chat messages */
  .chat-messages { flex: 1; overflow-y: auto; margin-bottom: 12px; }
  .chat-empty { color: #484f58; font-style: italic; padding: 20px 0; text-align: center; }
  .chat-msg { position: relative; padding: 10px 14px; border-radius: 10px; margin-bottom: 8px; max-width: 85%; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .chat-msg.from-admin { background: #2a0000; color: #f85149; margin-left: auto; border-bottom-right-radius: 3px; }
  .chat-msg.from-artist { background: #0a1929; color: #c9d1d9; margin-right: auto; border-bottom-left-radius: 3px; }
  .chat-msg.from-client { background: #1a1400; color: #d29922; margin-left: auto; border-bottom-right-radius: 3px; }
  .chat-msg.deleted { opacity: 0.4; font-style: italic; }
  .chat-msg-header { font-size: 10px; font-weight: 600; margin-bottom: 4px; opacity: 0.7; }
  .chat-msg-reply { font-size: 12px; padding: 4px 8px; border-radius: 4px; margin-bottom: 6px; border-left: 2px solid; cursor: pointer; }
  .chat-msg.from-admin .chat-msg-reply { background: #1a0000; border-color: #f85149; color: #f8514999; }
  .chat-msg.from-artist .chat-msg-reply { background: #060d18; border-color: #58a6ff; color: #58a6ff99; }
  .chat-msg.from-client .chat-msg-reply { background: #0f0a00; border-color: #d29922; color: #d2992299; }
  .chat-msg-actions { position: absolute; top: 4px; right: 6px; display: none; gap: 4px; }
  .chat-msg:hover .chat-msg-actions { display: flex; }
  .chat-action-btn { background: none; border: none; color: #484f58; font-size: 18px; cursor: pointer; padding: 6px 8px; border-radius: 6px; line-height: 1; }
  .chat-action-btn:hover { color: #c9d1d9; background: rgba(255,255,255,0.05); }
  .chat-deleted-label { font-size: 11px; color: #484f58; }
  .chat-restore-btn { background: none; border: none; color: #3fb950; font-size: 11px; cursor: pointer; margin-left: 8px; text-decoration: underline; }
  .chat-restore-btn:hover { color: #56d364; }

  /* Todo list in chat */
  .chat-todo { list-style: none; padding: 0; margin: 4px 0 0; }
  .chat-todo li { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px; line-height: 1.4; }
  .chat-todo-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #484f58; background: none; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: 0.15s; font-size: 0; line-height: 0; padding: 0; color: transparent; }
  .chat-todo-check:hover { border-color: #8b949e; }
  .chat-todo-check.checked { border-color: #3fb950; background: #3fb950; color: #0d1117; font-size: 13px; font-weight: 700; line-height: 1; }
  .chat-todo-text { flex: 1; }
  .chat-todo-text.done { text-decoration: line-through; opacity: 0.5; }

  /* Chat input area */
  .chat-input-area { flex-shrink: 0; }
  .chat-reply-preview { background: #21262d; border-radius: 6px; padding: 6px 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #8b949e; }
  .chat-reply-preview.hidden { display: none; }
  .chat-reply-close { background: none; border: none; color: #484f58; cursor: pointer; font-size: 16px; padding: 0 4px; }
  .chat-reply-close:hover { color: #c9d1d9; }
  .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .chat-input-row textarea { flex: 1; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.4; font-family: inherit; resize: none; min-height: 42px; max-height: 150px; overflow-y: auto; }
  .chat-input-row textarea:focus { outline: none; border-color: #1f6feb; }
  .chat-input-row textarea::placeholder { color: #484f58; }
  .chat-send-btn { background: #1f6feb; border: none; color: #fff; width: 42px; height: 42px; border-radius: 8px; cursor: pointer; font-size: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .chat-send-btn:hover { background: #388bfd; }
  .chat-hint { font-size: 11px; color: #484f58; margin-top: 6px; }
  .chat-todo-btn { background: none; border: 1px solid #30363d; color: #484f58; width: 42px; height: 42px; border-radius: 8px; cursor: pointer; font-size: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: 0.15s; }
  .chat-todo-btn:hover { border-color: #484f58; color: #c9d1d9; }
  .chat-todo-btn.active { border-color: #3fb950; color: #3fb950; background: #0a1f0a; }
  .chat-edited-mark { font-size: 10px; color: #484f58; font-style: italic; margin-top: 4px; }
  .chat-editing-hint { background: #1c1c00; border: 1px solid #d29922; border-radius: 6px; padding: 6px 10px; margin-bottom: 8px; font-size: 12px; color: #d29922; display: flex; align-items: center; justify-content: space-between; }
  .chat-editing-hint.hidden { display: none; }
  .chat-editing-close { background: none; border: none; color: #d29922; cursor: pointer; font-size: 16px; }

  .save-notice { position: fixed; bottom: 20px; right: 20px; background: #1f6feb; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .save-notice.show { opacity: 1; }
  .export-btn { background: #238636; border: 1px solid #2ea043; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: auto; }
  .export-btn:hover { background: #2ea043; }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>KILLHOUSE VFX</h2>
    <p>Enter your password to continue</p>
    <input type="password" id="loginPass" placeholder="Password" autofocus>
    <button class="login-btn" onclick="tryLogin()">Log In</button>
    <div class="login-divider">or</div>
    <button class="guest-btn" onclick="guestLogin()">Continue as Guest (view only)</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="gif-overlay hidden" id="gifOverlay">
  <button class="gif-close-btn" onclick="closeGif()">&times;</button>
  <img id="gifFull" src="" onclick="toggleGifPlay()">
  <div class="gif-controls">
    <button class="gif-ctrl-btn" id="gifPlayBtn" onclick="toggleGifPlay()">❚❚</button>
  </div>
</div>

<div class="note-overlay hidden" id="noteOverlay" onclick="if(event.target===this)closeNote()">
  <div class="note-panel">
    <div class="note-panel-header">
      <div class="note-panel-title">
        <h3 id="notePanelTitle">Note</h3>
        <span class="note-type-badge" id="noteTypeBadge"></span>
      </div>
      <button class="note-panel-close" onclick="closeNote()">&times;</button>
    </div>
    <div class="note-panel-meta">
      <span class="shot-id" id="noteShotId"></span>
      <span class="shot-desc" id="noteShotDesc"></span>
    </div>
    <div class="note-panel-body" id="notePanelBody"></div>
    <div class="note-panel-footer" id="notePanelFooter">
      <button class="note-cancel-btn" onclick="closeNote()">Cancel</button>
      <button class="note-save-btn" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<div class="header-row">
  <h1>KILLHOUSE VFX Tracker</h1>
  <div class="user-badge" id="userBadge" style="display:none">
    <span class="dot" id="userDot"></span>
    <span class="uname" id="userName"></span>
    <span class="logout-link" onclick="logout()">logout</span>
  </div>
</div>
<p class="subtitle">Declined tasks (Coffeepost) — 28 shots to review</p>

<div class="stats">
  <div class="stat-card"><div class="num red" id="stat-todo">0</div><div class="label">TODO</div></div>
  <div class="stat-card"><div class="num yellow" id="stat-progress">0</div><div class="label">IN PROGRESS</div></div>
  <div class="stat-card"><div class="num blue" id="stat-review">0</div><div class="label">REVIEW</div></div>
  <div class="stat-card"><div class="num green" id="stat-done">0</div><div class="label">DONE</div></div>
</div>

<div class="filters">
  <input type="text" id="search" placeholder="Search by ID or description...">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="todo">TODO</button>
  <button class="filter-btn" data-filter="progress">In Progress</button>
  <button class="filter-btn" data-filter="review">Review</button>
  <button class="filter-btn" data-filter="done">Done</button>
  <button class="filter-btn" data-filter="skip">Skip</button>
  <span class="separator">|</span>
  <button class="artist-filter-btn active" data-artist="all">All Artists</button>
  <button class="artist-filter-btn" data-artist="nikita">Nikita</button>
  <button class="artist-filter-btn" data-artist="igor">Igor</button>
  <button class="artist-filter-btn" data-artist="unassigned">Unassigned</button>
  <button class="export-btn" onclick="exportCSV()">Export CSV</button>
</div>

<table>
  <thead><tr>
    <th onclick="sortTable(0)">#</th>
    <th onclick="sortTable(1)">ID</th>
    <th>Preview</th>
    <th onclick="sortTable(2)">Description</th>
    <th onclick="sortTable(3)">Category</th>
    <th onclick="sortTable(4)">TC In</th>
    <th onclick="sortTable(5)">TC Out</th>
    <th onclick="sortTable(6)">Artist</th>

let _saving=false,_pendingSave=false;

function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return {};}}

function saveState(s){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(s));
  const n=document.getElementById("saveNotice");
  n.textContent="Saving...";n.classList.add("show");
  // Debounced remote save
  if(_saving){_pendingSave=true;return;}
  _saving=true;
  _pushRemote(s).finally(()=>{
    _saving=false;
    if(_pendingSave){_pendingSave=false;saveState(state);}
  });
}

async function _pushRemote(s){
  try{
    const data=Object.keys(s).length?s:{"_empty":true};
    const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY,"X-Bin-Versioning":"false"},
      body:JSON.stringify(data)
    });
    const j=await r.json();
    if(!r.ok){console.error("JSONBin PUT error:",j);throw new Error(j.message||"PUT failed");}
    const n=document.getElementById("saveNotice");
    n.textContent="Saved";n.style.background="#1f6feb";
    setTimeout(()=>n.classList.remove("show"),1200);
  }catch(e){
    console.error("Push failed:",e);
    const n=document.getElementById("saveNotice");
    n.textContent="Sync error!";n.style.background="#f85149";
    setTimeout(()=>{n.classList.remove("show");n.style.background="";},3000);
  }
}

async function _pullRemote(){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{
      headers:{"X-Master-Key":JSONBIN_KEY}
    });
    if(!r.ok){console.error("JSONBin GET status:",r.status);return false;}
    const j=await r.json();
    if(j.record&&typeof j.record==="object"){
      const rec=j.record;
      // Skip if bin is still initial/empty placeholder
      if(rec._init||rec._empty||rec._v) {
        // Bin has no real data yet — keep local state
        return false;
      }
      state=rec;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
      return true;
    }
  }catch(e){console.error("Pull failed:",e);}
  return false;
}

  if(d.artistNotes){d.artistNotes.forEach((n,i)=>{if(n.id===undefined){n.id=i;c=true;}});}
}if(c)localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}

function renderMsgContent(text, mid) {
  // Check if message contains todo items: lines starting with - [ ] or - [x]
  const lines = text.split('\n');
  const hasTodo = lines.some(l => /^\s*-\s*\[([ xX])\]/.test(l));
  if (!hasTodo) return `<div>${esc(text)}</div>`;

  let html = '<ul class="chat-todo">';
  let lineIdx = 0;
  for (const line of lines) {
    const todoMatch = line.match(/^\s*-\s*\[([ xX])\]\s*(.*)/);
    if (todoMatch) {
      const checked = todoMatch[1].toLowerCase() === 'x';
      const label = todoMatch[2];
      const canToggle = canChat(noteTaskId);
      html += `<li>`;
      html += `<button class="chat-todo-check${checked?' checked':''}" ${canToggle?`onclick="toggleTodo(${mid},${lineIdx})"`:''} title="${checked?'Uncheck':'Check'}">${checked?'&#10003;':''}</button>`;
      html += `<span class="chat-todo-text${checked?' done':''}">${esc(label)}</span>`;
      html += `</li>`;
    } else if (line.trim()) {
      html += `<li><span class="chat-todo-text">${esc(line)}</span></li>`;
    }
    lineIdx++;
  }
  html += '</ul>';
  return html;
}

function toggleTodo(mid, lineIdx) {
  const msgs = getChat(noteTaskId);
  const m = msgs.find(x => x.id === mid);
  if (!m || m.deleted) return;
  const lines = m.text.split('\n');
  if (lineIdx >= lines.length) return;
  const line = lines[lineIdx];
  const match = line.match(/^(\s*-\s*\[)([ xX])(\]\s*.*)/);
  if (!match) return;
  const newCheck = match[2].toLowerCase() === 'x' ? ' ' : 'x';
  lines[lineIdx] = match[1] + newCheck + match[3];
  m.text = lines.join('\n');
  saveState(state);
  renderChat();
  render();
}

function renderChat(){
  const msgs=getChat(noteTaskId),canSend=canChat(noteTaskId);
  const body=document.getElementById("notePanelBody");
  let html='<div class="chat-messages" id="chatMessages">';
  if(!msgs.length) html+='<div class="chat-empty">No messages yet</div>';
  else msgs.forEach(m=>{
    const isAdm=m.author==="admin",isCli=m.author==="client",cls=isAdm?"from-admin":isCli?"from-client":"from-artist";
    const del=m.deleted;
    html+=`<div class="chat-msg ${cls}${del?' deleted':''}" data-mid="${m.id}">`;
    if(!del&&!isGuest()){
      const isOwn=(isAdmin()&&m.author==="admin")||(isArtist()&&m.author==="artist")||(isClient()&&m.author==="client");
      html+=`<div class="chat-msg-actions">`;
      // Reply — anyone logged in, to any message including own
      if(canSend) html+=`<button class="chat-action-btn" onclick="replyTo(${m.id})" title="Reply">&#8617;</button>`;
      // Edit — own messages only
      if(isOwn) html+=`<button class="chat-action-btn" onclick="editMsg(${m.id})" title="Edit">&#9998;</button>`;
      // Delete — own + admin any
      if(isAdmin()||isOwn) html+=`<button class="chat-action-btn" onclick="deleteMsg(${m.id})" title="Delete">&#10005;</button>`;
      html+=`</div>`;
    }
    const timeStr=m.ts?new Date(m.ts).toLocaleString('uk-UA',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    const authorName=isAdm?'Admin':isCli?'Client':'Artist';
    html+=`<div class="chat-msg-header">${authorName}${timeStr?' &nbsp;<span style="opacity:0.5;font-weight:400">'+timeStr+'</span>':''}</div>`;
    if(m.replyTo!==undefined&&m.replyTo!==null){
      const orig=msgs.find(x=>x.id===m.replyTo);
      const preview=orig?(orig.deleted?'deleted message':trunc(orig.text,40)):'...';
      html+=`<div class="chat-msg-reply" onclick="scrollToMsg(${m.replyTo})">${esc(preview)}</div>`;
    }
    if(del){
      html+=`<span class="chat-deleted-label">message deleted</span>`;
      if(isAdmin()) html+=`<button class="chat-restore-btn" onclick="restoreMsg(${m.id})">restore</button>`;
    } else {
      html+=renderMsgContent(m.text, m.id);
      if(m.edited) html+=`<div class="chat-edited-mark">edited</div>`;
    }
    html+=`</div>`;
  });
  html+='</div>';
  if(canSend){
    html+=`<div class="chat-input-area">`;
    html+=`<div class="chat-editing-hint${editingMsgId!==null?'':' hidden'}" id="chatEditHint"><span>Editing message...</span><button class="chat-editing-close" onclick="cancelEdit()">&times;</button></div>`;
    html+=`<div class="chat-reply-preview hidden" id="chatReplyPreview"><span id="chatReplyText"></span><button class="chat-reply-close" onclick="cancelReply()">&times;</button></div>`;
    html+=`<div class="chat-input-row"><button class="chat-todo-btn${todoMode?' active':''}" onclick="toggleTodoMode()" title="Todo list builder">&#9745;</button><textarea id="chatTA" placeholder="${todoMode?'Each line = todo item. Enter to send list.':'Enter to send, Shift+Enter for new line...'}" rows="1"></textarea><button class="chat-send-btn" onclick="sendChat()">&#9654;</button></div>`;
    html+=`<div class="chat-hint">${todoMode?'Todo mode: each Shift+Enter = new item &nbsp;|&nbsp; Enter — send list':'Enter — send &nbsp;|&nbsp; Shift+Enter — new line &nbsp;|&nbsp; &#9745; — todo builder'}</div>`;
    html+=`</div>`;
  }
  body.innerHTML=html;
  // Auto-scroll to bottom
  setTimeout(()=>{const c=document.getElementById("chatMessages");if(c)c.scrollTop=c.scrollHeight;},30);
  // Bind Enter key
  const ta=document.getElementById("chatTA");
  if(ta){
    ta.addEventListener("keydown",e=>{
      if(todoMode){
        if(e.key==="Enter"&&e.shiftKey){
          // Add new todo item
          e.preventDefault();
          const pos=ta.selectionStart;
          ta.value=ta.value.substring(0,pos)+"\n○ "+ta.value.substring(ta.selectionEnd);
          ta.selectionStart=ta.selectionEnd=pos+3;
          ta.dispatchEvent(new Event("input"));
        } else if(e.key==="Enter"&&!e.shiftKey){
          e.preventDefault();sendChat();
        }
      } else {
        if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}
      }
    });
    ta.addEventListener("input",()=>{ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,150)+"px";});
    ta.focus();
  }
}

function toggleTodoMode(){
  const ta=document.getElementById("chatTA");
  const savedText=ta?ta.value:'';
  todoMode=!todoMode;
  renderChat();
  setTimeout(()=>{
    const t=document.getElementById("chatTA");
    if(!t)return;
    if(todoMode){
      if(!savedText.trim()) t.value="○ ";
      else t.value=savedText;
    } else {
      t.value=savedText;
    }
    t.focus();t.setSelectionRange(t.value.length,t.value.length);
    t.dispatchEvent(new Event("input"));
  },50);
}

function sendChat(){
  const ta=document.getElementById("chatTA");if(!ta)return;
  let text=ta.value.trim();if(!text)return;
  // Convert visual ○/● back to - [ ]/- [x], and auto-prefix plain lines in todo mode
  if(todoMode){
    text=text.split('\n').map(l=>{
      let trimmed=l.trim();
      if(!trimmed)return '';
      // Convert visual circles to markdown
      if(trimmed.startsWith('○ '))return '- [ ] '+trimmed.substring(2);
      if(trimmed.startsWith('● '))return '- [x] '+trimmed.substring(2);
      if(/^\s*-\s*\[([ xX])\]/.test(trimmed))return trimmed;
      return '- [ ] '+trimmed;
    }).filter(Boolean).join('\n');
    if(!text)return;
  }
  if(!state[noteTaskId])state[noteTaskId]={};
  if(!state[noteTaskId].artistNotes)state[noteTaskId].artistNotes=[];
  if(editingMsgId!==null){
    // Edit existing message
    const m=state[noteTaskId].artistNotes.find(x=>x.id===editingMsgId);
    if(m){m.text=text;m.edited=true;}
    editingMsgId=null;
  } else {
    const author=isAdmin()?"admin":isClient()?"client":"artist";
    const msg={id:nextMsgId(noteTaskId),author,text,replyTo:replyToId,ts:Date.now()};
    state[noteTaskId].artistNotes.push(msg);
  }
  replyToId=null;
  if(todoMode)todoMode=false;
  saveState(state);
  renderChat();
  render();
}

function deleteMsg(mid){
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  if(!m)return;
  const isOwn=(isArtist()&&m.author==="artist")||(isClient()&&m.author==="client");
  if(isAdmin()||isOwn){
    m.deletedText=m.text; // preserve for admin restore
    m.deleted=true;m.text="";
    saveState(state);
    renderChat();
    render();
  }
}

function restoreMsg(mid){
  if(!isAdmin())return;
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  if(!m||!m.deleted)return;
  m.text=m.deletedText||"[restored]";
  m.deleted=false;
  delete m.deletedText;
  saveState(state);
  renderChat();
  render();
}

function editMsg(mid){
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  if(!m||m.deleted)return;
  editingMsgId=mid;
  renderChat();
  setTimeout(()=>{
    const ta=document.getElementById("chatTA");
    if(ta){ta.value=m.text;ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);ta.dispatchEvent(new Event("input"));}
  },50);
}

function cancelEdit(){
  editingMsgId=null;
  renderChat();
}

function replyTo(mid){
  replyToId=mid;
  const msgs=getChat(noteTaskId);
  const m=msgs.find(x=>x.id===mid);
  const prev=document.getElementById("chatReplyPreview");
  const txt=document.getElementById("chatReplyText");
  if(prev&&txt&&m){
    txt.textContent="Reply to: "+(m.deleted?"deleted message":trunc(m.text,50));
    prev.classList.remove("hidden");
  }
  const ta=document.getElementById("chatTA");if(ta)ta.focus();
}

function cancelReply(){
  replyToId=null;
  const prev=document.getElementById("chatReplyPreview");
  if(prev)prev.classList.add("hidden");
}

function scrollToMsg(mid){
  const el=document.querySelector(`.chat-msg[data-mid="${mid}"]`);
  if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.style.outline="1px solid #484f58";setTimeout(()=>el.style.outline="",1500);}
}

function closeNote(){document.getElementById("noteOverlay").classList.add("hidden");noteTaskId=null;noteType=null;replyToId=null;editingMsgId=null;todoMode=false;}

function saveNote(){
  if(!noteTaskId||noteType!=="admin")return;
  const ta=document.getElementById("noteTA");if(!ta)return;
  if(!state[noteTaskId])state[noteTaskId]={};
  state[noteTaskId].adminNote=ta.value;
  saveState(state);closeNote();render();
}

document.addEventListener("keydown",e=>{if(e.key==="Escape"&&!document.getElementById("noteOverlay").classList.contains("hidden"))closeNote();});

const GIFS=new Set(["KH_01_198","KH_01_199","KH_01_201","KH_01_204","KH_01_209","KH_01_220","KH_01_221","KH_01_225","KH_01_227","KH_01_228","KH_01_253","KH_01_254","KH_01_321","KH_01_322","KH_01_323","KH_01_323_1","KH_01_324","KH_01_325","KH_01_326","KH_01_327","KH_01_329","KH_01_330","KH_01_331","KH_01_333","KH_01_334","KH_01_335","KH_01_336"]);
function hasGif(id){return GIFS.has(id);}
let gifPlaying=true;
function openGif(id){
  const img=document.getElementById("gifFull");
  img.src="gif/"+id+".gif";
  gifPlaying=true;
  document.getElementById("gifPlayBtn").textContent="❚❚";
  document.getElementById("gifOverlay").classList.remove("hidden");
}
function closeGif(){
  document.getElementById("gifOverlay").classList.add("hidden");
  document.getElementById("gifFull").src="";
}
async function toggleGifPlay(){
  const img=document.getElementById("gifFull");
  const btn=document.getElementById("gifPlayBtn");
  if(gifPlaying){
    // Freeze current frame using createImageBitmap (captures actual displayed frame)
    try{
      const bmp=await createImageBitmap(img);
      const c=document.createElement("canvas");
      c.width=bmp.width;c.height=bmp.height;
      c.getContext("2d").drawImage(bmp,0,0);
      bmp.close();
      img.dataset.origSrc=img.src;
      img.src=c.toDataURL();
    }catch(e){
      // Fallback
      const c=document.createElement("canvas");
      c.width=img.naturalWidth;c.height=img.naturalHeight;
      c.getContext("2d").drawImage(img,0,0);
      img.dataset.origSrc=img.src;
      img.src=c.toDataURL();
    }
    btn.textContent="▶";gifPlaying=false;
  } else {
    img.src=img.dataset.origSrc;
    btn.textContent="❚❚";gifPlaying=true;
  }
}

// Draw first frame of gifs onto canvases (static thumbnails)
function initGifThumbs(){
  document.querySelectorAll("canvas.gif-thumb[data-gif]").forEach(cv=>{
    const src=cv.dataset.gif;
    if(cv.dataset.loaded)return;
    const img=new Image();
    img.onload=()=>{
      cv.width=img.naturalWidth;cv.height=img.naturalHeight;
      cv.getContext("2d").drawImage(img,0,0);
      cv.dataset.loaded="1";
      img.src=""; // stop gif animation / free memory
    };
    img.src=src;
  });
}

document.addEventListener("keydown",e=>{if(e.key==="Escape")closeGif();});

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function trunc(s,n){return !s?"":s.length>n?s.substring(0,n)+"...":s;}

// --- RENDER TABLE ---
function render(){
  const tbody=document.getElementById("tbody");
  let rows=TASKS.map((t,i)=>({...t,idx:i+1,status:getStatus(t.id),assignee:getAssignee(t.id)}));
  if(searchQuery){const q=searchQuery.toLowerCase();rows=rows.filter(r=>r.id.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q));}
  if(currentFilter!=="all")rows=rows.filter(r=>r.status===currentFilter);
  if(artistFilter!=="all"){if(artistFilter==="unassigned")rows=rows.filter(r=>!r.assignee);else rows=rows.filter(r=>r.assignee===artistFilter);}
  if(sortCol>=0){const keys=["idx","id","desc","cat","tcIn","tcOut","assignee","status"];const k=keys[sortCol];rows.sort((a,b)=>{let va=a[k],vb=b[k];if(typeof va==="string")va=va.toLowerCase();if(typeof vb==="string")vb=vb.toLowerCase();return va<vb?(sortAsc?-1:1):va>vb?(sortAsc?1:-1):0;});}

  tbody.innerHTML=rows.map(r=>{
    const st=r.status,stClass="s-"+st,editSt=canEditStatus(r.id),adm=canAssign();
    const assignCls=r.assignee?" assign-"+r.assignee:"";
    const an=getAdminNote(r.id);
    const cp=chatPreview(r.id);const cpPrev=trunc(cp.text,20);
    const countBadge=cp.count?`<span class="msg-count">${cp.count}</span>`:"";
    const artistOpts=ARTISTS.map(a=>`<option value="${a.id}" ${r.assignee===a.id?"selected":""}>${a.display}</option>`).join("");
    return `<tr>
      <td style="color:#484f58">${r.idx}</td>
      <td class="id-cell">${r.id}</td>
      <td class="gif-cell">${hasGif(r.id)?`<div class="gif-thumb-wrap" onclick="openGif('${r.id}')"><canvas class="gif-thumb" data-gif="gif/${r.id}.gif"></canvas><div class="gif-play-icon"></div></div>`:'<div class="gif-none">—</div>'}</td>
      <td class="desc-cell${canEditDesc()?' editable':''}" ${canEditDesc()?`onclick="startEditDesc('${r.id}',this,event)"`:''} data-tid="${r.id}">${getDesc(r.id,r.desc)}</td>
      <td class="category-cell"><span class="cat-tag cat-${r.cat}">${CAT_LABELS[r.cat]}</span></td>
      <td class="tc-cell">${r.tcIn}</td>
      <td class="tc-cell">${r.tcOut}</td>
      <td><select class="assign-select${assignCls}" onchange="setAssignee('${r.id}',this.value)" ${adm?"":"disabled"}><option value="" ${!r.assignee?"selected":""}>—</option>${artistOpts}</select></td>
      <td><select class="status-select ${stClass}" onchange="setStatus('${r.id}',this.value,this)" ${editSt?"":"disabled"}>
        <option value="todo" ${st==="todo"?"selected":""}>TODO</option><option value="progress" ${st==="progress"?"selected":""}>In Progress</option>
        <option value="review" ${st==="review"?"selected":""}>Review</option><option value="done" ${st==="done"?"selected":""}>Done</option>
        <option value="skip" ${st==="skip"?"selected":""}>Skip</option></select></td>
      <td class="desc-cell${canEditAdminNote()?' editable':''}" ${canEditAdminNote()?`onclick="startEditAdmin('${r.id}',this,event)"`:''} data-tid="${r.id}">${an||'<span style="color:#484f58">...</span>'}</td>
      <td><div class="note-cell type-artist${cp.text?' has-text':''}" onclick="openNote('${r.id}','chat')">${cpPrev||'...'} ${cp.count?'<span class="msg-count" style="font-size:10px;color:#58a6ff">('+cp.count+')</span>':''}</div></td>
    </tr>`;
  }).join("");
  updateStats();
  setTimeout(initGifThumbs,50);
}

function startEditDesc(tid,td,ev){
  if(!canEditDesc())return;
  ev.stopPropagation();
  const current=getDesc(tid,TASKS.find(t=>t.id===tid)?.desc||'');
  td.innerHTML=`<textarea class="desc-edit-ta" rows="1">${esc(current)}</textarea>`;
  td.onclick=null;
  const ta=td.querySelector('textarea');
  if(ta){
    // Auto-size to content
    ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    ta.addEventListener('blur',()=>saveDesc(tid,ta));
    ta.addEventListener('keydown',e=>{
      if(e.key==='Escape'){ta.dataset.cancel='1';ta.blur();}
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}
    });
  }
}
function saveDesc(tid,ta){
  if(ta.dataset.cancel==='1'){render();return;}
  const val=ta.value.trim();
  if(!val){render();return;}
  if(!state[tid])state[tid]={};
  state[tid].desc=val;
  saveState(state);
  render();
}

function startEditAdmin(tid,td,ev){
  if(!canEditAdminNote())return;
  ev.stopPropagation();
  const current=getAdminNote(tid);
  td.innerHTML=`<textarea class="desc-edit-ta" rows="1">${esc(current)}</textarea>`;
  td.onclick=null;
  const ta=td.querySelector('textarea');
  if(ta){
    ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});
    ta.addEventListener('blur',()=>saveAdmin(tid,ta));
    ta.addEventListener('keydown',e=>{
      if(e.key==='Escape'){ta.dataset.cancel='1';ta.blur();}
      if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}
    });
  }
}
function saveAdmin(tid,ta){
  if(ta.dataset.cancel==='1'){render();return;}
  if(!state[tid])state[tid]={};
  state[tid].adminNote=ta.value.trim();
  saveState(state);
  render();
}

function setStatus(id,val,el){if(!canEditStatus(id))return;if(!state[id])state[id]={};state[id].status=val;saveState(state);el.className="status-select s-"+val;updateStats();}
function setAssignee(id,val){if(!canAssign())return;if(!state[id])state[id]={};state[id].assignee=val;saveState(state);render();}
function sortTable(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}render();}
document.getElementById("search").addEventListener("input",e=>{searchQuery=e.target.value;render();});
document.querySelectorAll(".filter-btn").forEach(b=>{b.addEventListener("click",()=>{document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");currentFilter=b.dataset.filter;render();});});
document.querySelectorAll(".artist-filter-btn").forEach(b=>{b.addEventListener("click",()=>{document.querySelectorAll(".artist-filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");artistFilter=b.dataset.artist;render();});});

function exportCSV(){
  let csv="ID,Description,Category,TC In,TC Out,Artist,Status,Admin Notes,Chat\n";
  TASKS.forEach(t=>{const st=getStatus(t.id),ar=getAssignee(t.id);const an=getAdminNote(t.id).replace(/"/g,'""');const ch=getChat(t.id).filter(m=>!m.deleted).map(m=>`[${m.author}] ${m.text}`).join("\n").replace(/"/g,'""');csv+=`"${t.id}","${t.desc}","${CAT_LABELS[t.cat]}","${t.tcIn}","${t.tcOut}","${ar}","${st}","${an}","${ch}"\n`;});
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="kh_vfx_tracker.csv";a.click();
}
render();

// Auto-sync: pull remote every 30s
setInterval(async()=>{
  if(_saving)return;
  const pulled=await _pullRemote();
  if(pulled){runMigrations();render();
    // Re-render chat if open
    if(noteTaskId&&noteType==='chat')renderChat();
  }
},30000);
</script>
